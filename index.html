<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#040016" />
<title>Light Up The City</title>
<style>
  :root {
    --neon-pink: #ff2bd6;
    --neon-cyan: #00f0ff;
    --neon-purple: #b14cff;
    --neon-yellow: #ffd23f;
    --neon-green: #39ff88;
    --neon-orange: #ff8c2b;
    --bg-deep: #040016;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    font-family: 'Courier New', monospace;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  body {
    background:
      radial-gradient(ellipse at 20% 0%, rgba(177, 76, 255, 0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(255, 43, 214, 0.15) 0%, transparent 55%),
      var(--bg-deep);
  }

  #app {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .game-frame {
    position: relative;
    width: min(420px, 100vw);
    height: min(910px, 100vh);
    background: var(--bg-deep);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(255, 43, 214, 0.3);
    box-shadow: 0 0 40px rgba(255, 43, 214, 0.4), 0 0 80px rgba(177, 76, 255, 0.2);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .hud {
    display: none !important;  /* HUD hidden */
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 14px 14px 10px;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
  }

  .lights-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border: 1px solid var(--neon-green);
    border-radius: 6px;
    color: var(--neon-green);
    font-size: 10px;
    letter-spacing: 2px;
    font-weight: bold;
    background: rgba(0,0,0,0.4);
    box-shadow: 0 0 8px rgba(57, 255, 136, 0.4);
    text-shadow: 0 0 6px var(--neon-green);
    text-transform: uppercase;
  }
  .lights-badge .dot {
    width: 6px; height: 6px;
    background: var(--neon-green);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--neon-green);
    animation: blink 1.6s infinite;
  }
  @keyframes blink {
    0%, 70%, 100% { opacity: 1; }
    80%, 90% { opacity: 0.3; }
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    margin-left: 6px;
    background: rgba(26, 5, 51, 0.7);
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: inherit;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(0,240,255,0.4), inset 0 0 6px rgba(0,240,255,0.1);
    text-shadow: 0 0 4px var(--neon-cyan);
    transition: transform 0.1s;
    line-height: 1;
    pointer-events: auto;
  }
  .icon-btn:active { transform: scale(0.9); background: rgba(0, 240, 255, 0.25); }

  .lit-counter {
    align-self: center;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 2px;
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan), 0 0 16px rgba(0,240,255,0.5);
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(0,240,255,0.3);
    border-radius: 6px;
    padding: 4px 10px;
    pointer-events: none;
    transition: color 0.3s, text-shadow 0.3s;
  }
  .lit-counter.high { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink), 0 0 18px rgba(255,43,214,0.6); border-color: rgba(255,43,214,0.4); }

  /* Intro camera tilt-down animation */
  @keyframes camera-tilt-down {
    0%   { transform: translateY(-10%) scale(1.10); opacity: 0.25; filter: blur(3px); }
    60%  { opacity: 1; filter: blur(0.5px); }
    100% { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
  }
  .intro-anim canvas { animation: camera-tilt-down 1.4s cubic-bezier(0.2, 0.8, 0.3, 1.0) both; }
  .intro-anim .hud, .intro-anim .controls, .intro-anim .hint-text {
    animation: fade-in 0.6s ease-out 0.8s both;
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  /* Achievement modal */
  #achievement {
    background: radial-gradient(ellipse at center, rgba(177,76,255,0.4) 0%, rgba(4,0,22,0.92) 70%);
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    pointer-events: auto;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    animation: fade-in 0.6s ease-out;
  }
  #achievement.hidden { display: none; }
  .ach-card {
    background: linear-gradient(145deg, rgba(26,5,51,0.9), rgba(8,2,30,0.95));
    border: 2px solid var(--neon-pink);
    border-radius: 14px;
    padding: 28px 24px;
    text-align: center;
    box-shadow: 0 0 30px rgba(255,43,214,0.6), inset 0 0 18px rgba(177,76,255,0.25);
    max-width: 320px;
    animation: card-in 0.6s cubic-bezier(0.2,0.8,0.3,1.2);
  }
  @keyframes card-in {
    from { transform: scale(0.7) translateY(40px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  .ach-eyebrow {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px var(--neon-yellow);
    margin-bottom: 14px;
    animation: blink 1.4s infinite;
  }
  .ach-title {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 3px;
    line-height: 1;
    text-transform: uppercase;
    background: linear-gradient(180deg, var(--neon-pink), var(--neon-cyan));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px rgba(255,43,214,0.5));
    margin-bottom: 8px;
  }
  .ach-title .accent {
    background: linear-gradient(180deg, var(--neon-yellow), var(--neon-orange));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px rgba(255,210,63,0.6));
  }
  .ach-sub {
    font-size: 9px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    margin: 6px 0 12px;
  }
  .ach-stat {
    font-size: 11px;
    color: var(--neon-cyan);
    text-shadow: 0 0 6px var(--neon-cyan);
    letter-spacing: 1.5px;
    margin-bottom: 18px;
  }
  .ach-actions { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .ach-cta {
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
    border: none;
    color: #fff;
    font-family: inherit;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 12px 18px;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 0 14px rgba(255,43,214,0.6);
    text-shadow: 0 0 6px rgba(0,0,0,0.5);
  }
  .ach-cta:active { transform: scale(0.96); }
  .ach-secondary {
    background: transparent;
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    text-shadow: 0 0 4px var(--neon-cyan);
  }
  .ach-uber {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--neon-yellow);
    text-shadow: 0 0 6px var(--neon-yellow);
    margin-top: 6px;
    text-transform: uppercase;
  }

  .controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    padding: 8px 12px calc(env(safe-area-inset-bottom, 0px) + 6px);
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
    background: linear-gradient(0deg, rgba(4,0,22,0.95) 30%, transparent 100%);
  }

  .colors {
    display: flex;
    justify-content: center;
    gap: 10px;
    pointer-events: auto;
  }

  .color-swatch {
    width: 36px;          /* mobile tap-target (Apple HIG 44px ideal, 36px workable) */
    height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    cursor: pointer;
    position: relative;
    transition: transform 0.1s;
  }
  .color-swatch.active { transform: scale(1.20); border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.55); }
  .color-swatch.rainbow::after { box-shadow: 0 0 12px #ff2bd6, 0 0 18px #00f0ff, 0 0 10px #ffd23f; opacity: 0.6; }
  @keyframes rainbow-spin { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }
  .color-swatch::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    box-shadow: 0 0 16px currentColor;
    opacity: 0.7;
    pointer-events: none;
  }

  .brush-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    pointer-events: auto;
    color: var(--neon-cyan);
    font-size: 11px;
    letter-spacing: 2px;
    font-weight: bold;
    text-shadow: 0 0 4px var(--neon-cyan);
  }
  .brush-row input[type=range] {
    flex: 1;
    max-width: 260px;
    accent-color: var(--neon-pink);
    height: 6px;
  }
  .brush-val { min-width: 22px; text-align: right; color: var(--neon-pink); text-shadow: 0 0 4px var(--neon-pink); font-size: 12px; }

  #tooltip {
    position: absolute;
    z-index: 30;
    pointer-events: none;
    background: rgba(4,0,22,0.92);
    border: 1px solid var(--neon-cyan);
    color: #fff;
    text-shadow: 0 0 6px var(--neon-cyan);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 10px;
    letter-spacing: 2px;
    font-weight: bold;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #tooltip.show { opacity: 1; }

  #brush-cursor {
    position: absolute;
    z-index: 25;
    pointer-events: none;
    border: 1px solid rgba(255,255,255,0.55);
    border-radius: 50%;
    box-shadow: 0 0 8px currentColor;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.2s;
    will-change: transform, opacity;
  }
  #brush-cursor.show { opacity: 1; }
  .color-swatch.eraser {
    background: repeating-linear-gradient(45deg, #444 0 4px, #000 4px 8px) !important;
    border-color: #fff;
  }
  .color-swatch.tap-pulse {
    animation: tap-flash 0.4s ease-out;
  }
  @keyframes tap-flash {
    0% { box-shadow: 0 0 0 0 #fff; transform: scale(1.18); }
    50% { box-shadow: 0 0 0 8px transparent; transform: scale(1.4); }
    100% { box-shadow: 0 0 0 0 transparent; transform: scale(1.18); }
  }
  @keyframes lightning-flash {
    0%, 100% { opacity: 0; }
    5%, 15% { opacity: 0.6; }
    10% { opacity: 0; }
  }
  #ta-btn {
    display: none !important;
    position: absolute;
    bottom: 86px; right: 14px;
    z-index: 22;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(26,5,51,0.7);
    border: 1px solid var(--neon-yellow);
    color: var(--neon-yellow);
    font-family: inherit;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1px;
    text-shadow: 0 0 6px var(--neon-yellow);
    box-shadow: 0 0 10px rgba(255,210,63,0.4);
    cursor: pointer;
  }
  #ta-btn:active { transform: scale(0.92); }
  #ta-overlay {
    display: none;
    position: absolute;
    top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 24;
    padding: 6px 14px;
    background: rgba(4,0,22,0.85);
    border: 1px solid var(--neon-yellow);
    border-radius: 24px;
    color: var(--neon-yellow);
    font-family: inherit;
    font-weight: bold;
    letter-spacing: 2px;
    text-shadow: 0 0 6px var(--neon-yellow);
    box-shadow: 0 0 12px rgba(255,210,63,0.4);
    display: none;
  }
  #ta-overlay.show { display: flex; gap: 8px; align-items: baseline; }
  #ta-overlay #ta-timer { font-size: 22px; }
  #ta-overlay .ta-lbl { font-size: 10px; opacity: 0.8; }
  #ta-result { z-index: 60; background: radial-gradient(ellipse at center, rgba(177,76,255,0.4) 0%, rgba(4,0,22,0.92) 70%); align-items: center; justify-content: center; }
  #ta-result.show { display: flex; }
  .ta-card {
    background: linear-gradient(180deg, rgba(26,5,51,0.95), rgba(4,0,22,0.97));
    border: 1px solid var(--neon-cyan);
    border-radius: 16px;
    padding: 26px 30px;
    text-align: center;
    box-shadow: 0 0 30px rgba(0,240,255,0.4);
  }
  .ta-eyebrow {
    color: var(--neon-cyan);
    font-size: 11px;
    letter-spacing: 4px;
    margin-bottom: 8px;
    text-shadow: 0 0 6px var(--neon-cyan);
  }
  .ta-score {
    font-size: 56px;
    font-weight: bold;
    color: var(--neon-pink);
    text-shadow: 0 0 12px var(--neon-pink), 0 0 24px var(--neon-pink);
    letter-spacing: 2px;
    margin: 4px 0 8px;
  }
  .ta-sub { font-size: 10px; letter-spacing: 2px; opacity: 0.7; margin-bottom: 18px; }
  .ta-card button {
    margin: 4px;
    padding: 8px 16px;
    background: rgba(0,240,255,0.15);
    border: 1px solid var(--neon-cyan);
    color: #fff;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 2px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
    text-shadow: 0 0 4px var(--neon-cyan);
  }
  .ta-card button:active { transform: scale(0.95); }

  #music-toggle {
    position: absolute;
    top: env(safe-area-inset-top, 8px);
    right: 10px;
    z-index: 28;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(4,0,22,0.7);
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-size: 18px;
    line-height: 30px;
    cursor: pointer;
    text-shadow: 0 0 6px var(--neon-cyan);
    box-shadow: 0 0 8px rgba(0,240,255,0.4);
    padding: 0;
  }
  #music-toggle.muted { color: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.35); text-shadow: none; box-shadow: none; }
  #music-toggle:active { transform: scale(0.92); }

  .lightning-flash {
    position: absolute; inset: 0; z-index: 19;
    background: rgba(220,220,255,1);
    pointer-events: none;
    animation: lightning-flash 0.4s linear;
  }

  .modes {
    display: flex;
    justify-content: center;
    gap: 6px;
    pointer-events: auto;
  }

  .mode-btn {
    flex: 1;
    max-width: 90px;
    padding: 8px 4px;
    background: rgba(26, 5, 51, 0.7);
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 1px;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(0,240,255,0.4), inset 0 0 6px rgba(0,240,255,0.1);
    text-shadow: 0 0 4px var(--neon-cyan);
    transition: all 0.1s;
  }
  .mode-btn.active {
    background: rgba(0, 240, 255, 0.25);
    box-shadow: 0 0 16px var(--neon-cyan), inset 0 0 12px rgba(0,240,255,0.4);
    color: #fff;
    text-shadow: 0 0 6px #fff, 0 0 12px var(--neon-cyan);
  }
  .mode-btn:active { transform: scale(0.95); }

  .overlay {
    position: absolute;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
  }
  .overlay.hidden { display: none; }

  #title-screen {
    background: #040016;
    cursor: pointer;
    overflow: hidden;
  }
  #title-screen:active { filter: brightness(1.15); }
  #title-screen.hidden { display: none; }
  #intro-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;     /* full video, no crop, letterbox if needed */
    background: #040016;
    z-index: 1;
  }
  .intro-scanlines {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background:
      repeating-linear-gradient(180deg, rgba(0,0,0,0) 0 2px, rgba(0,0,0,0.18) 2px 3px),
      radial-gradient(ellipse at center, rgba(0,0,0,0) 50%, rgba(0,0,0,0.55) 100%);
    mix-blend-mode: multiply;
  }
  .intro-content {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    text-align: center;
    padding: 0 24px 130px;  /* above PICK-UP ZONE */
  }

  .intro-eyebrow {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan);
    text-transform: uppercase;
    margin-bottom: 18px;
    opacity: 0.85;
  }
  .intro-title {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 4px;
    line-height: 0.95;
    text-transform: uppercase;
    background: linear-gradient(180deg, var(--neon-pink) 0%, var(--neon-purple) 50%, var(--neon-cyan) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 14px rgba(255, 43, 214, 0.6)) drop-shadow(0 0 22px rgba(177, 76, 255, 0.4));
    margin-bottom: 8px;
  }
  .intro-title .accent {
    background: linear-gradient(180deg, var(--neon-yellow), var(--neon-orange));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 14px rgba(255, 210, 63, 0.7));
  }
  .intro-sub {
    font-size: 11px;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    margin-top: 10px;
    margin-bottom: 32px;
  }
  .intro-cta {
    font-size: 14px;
    letter-spacing: 6px;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px var(--neon-yellow), 0 0 20px var(--neon-yellow);
    text-transform: uppercase;
    font-weight: bold;
    border: 2px solid var(--neon-yellow);
    padding: 14px 32px;
    box-shadow: 0 0 18px rgba(255, 210, 63, 0.5), inset 0 0 14px rgba(255, 210, 63, 0.15);
    animation: pulse 1.6s ease-in-out infinite;
    margin-top: 20px;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 18px rgba(255, 210, 63, 0.5), inset 0 0 14px rgba(255, 210, 63, 0.15); }
    50% { box-shadow: 0 0 32px rgba(255, 210, 63, 0.8), inset 0 0 20px rgba(255, 210, 63, 0.3); }
  }
  .intro-skyline {
    font-size: 9px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 28px;
  }
  .intro-skyline span { color: var(--neon-pink); text-shadow: 0 0 6px var(--neon-pink); }

  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    pointer-events: none;
  }
  .loading.hidden { display: none; }

  .hint-text {
    position: absolute;
    top: 70px; left: 0; right: 0;
    text-align: center;
    z-index: 9;
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    pointer-events: none;
    text-shadow: 0 0 6px rgba(0,240,255,0.6);
    transition: opacity 0.5s;
  }
  .hint-text.fade { opacity: 0; }

  @media (max-width: 480px) {
    .game-frame { border: none; box-shadow: none; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="game-frame">
    <div class="hud">
      <div><div class="lights-badge off" id="lights-badge"><span class="dot"></span><span id="lights-text">Lights Off</span></div></div>
      <div class="lit-counter" id="lit-counter">0%</div>
      <div style="text-align: right;">
        <button class="icon-btn" id="reset-btn" title="Reset">↻</button>
        <button class="icon-btn" id="save-btn" title="Save">⤓</button>
      </div>
    </div>

    <div class="hint-text" id="hint-text">Drag to light up Sydney</div>

    <canvas id="game"></canvas>

    <div class="loading" id="loading">Loading skyline…</div>

    <div class="controls">

             poster="intro_scan_lights_poster.jpg">

        <source src="intro_scan_lights_loop.mp4" type="video/mp4">

    <audio id="bg-music" loop preload="auto" autoplay src="midnight-circuit-loop.mp3"></audio>
    <button id="music-toggle" title="Music">♫</button>

    <div class="overlay hidden" id="achievement">
      <div class="ach-card">
        <div class="ach-eyebrow">★ VIVID UNLOCKED ★</div>
        <div class="ach-title">YOU LIT UP<br/><span class="accent">SYDNEY</span></div>
        <div class="ach-sub">Backseat Arcade · Vivid Edition</div>
        <div class="ach-stat" id="ach-stat">100% lit · A masterpiece</div>
        <div class="ach-actions">
          <button class="ach-cta" id="ach-share">Save & Share</button>
          <button class="ach-secondary" id="ach-close">Keep Painting</button>
        </div>
        <div class="ach-uber">↗ Tap city to claim Uber Vivid ride credit</div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const titleScreen = document.getElementById('title-screen');
  const loadingEl = document.getElementById('loading');
  const colorsEl = document.getElementById('colors');
  const lightsTextEl = document.getElementById('lights-text');
  const hintEl = document.getElementById('hint-text');
  const resetBtn = document.getElementById('reset-btn');
  const saveBtn = document.getElementById('save-btn');

  const COLORS = [
    { hex: '#ff2bd6' }, { hex: '#00f0ff' }, { hex: '#b14cff' },
    { hex: '#ffd23f' }, { hex: '#39ff88' }, { hex: '#ff8c2b' },
    { hex: 'eraser' },   // destination-out brush
  ];

  let W = 0, H = 0, DPR = 1;
  let imgFit = { x: 0, y: 0, w: 0, h: 0 };

  const litCanvas = document.createElement('canvas');
  const litCtx = litCanvas.getContext('2d');
  const maskCanvas = document.createElement('canvas');
  const maskCtx = maskCanvas.getContext('2d');
  const tempCanvas = document.createElement('canvas');
  const tempCtx = tempCanvas.getContext('2d');
  const bloomCanvas = document.createElement('canvas');
  const bloomCtx = bloomCanvas.getContext('2d');
  const bloomCanvas2 = document.createElement('canvas');
  const bloomCtx2 = bloomCanvas2.getContext('2d');
  // Flicker layer — short-lived bright bursts on fresh paint (#1)
  const flickerCanvas = document.createElement('canvas');
  const flickerCtx = flickerCanvas.getContext('2d');
  const flickers = []; // {x, y, t, dur, color}

  // #7 — Landmark tooltip zones (normalized 0-1 coords keyed to current skyline)
  const LANDMARKS = [
    { x: 0.46, y: 0.20, r: 0.06, name: 'SYDNEY TOWER' },
    { x: 0.12, y: 0.75, r: 0.10, name: 'OPERA HOUSE' },
    { x: 0.65, y: 0.74, r: 0.18, name: 'HARBOUR BRIDGE' },
    { x: 0.92, y: 0.92, r: 0.08, name: 'LUNA PARK' },
    { x: 0.86, y: 0.38, r: 0.06, name: 'AWA TOWER' },
  ];
  // #1 — Building wake-up cascade tasks
  const cascadeTasks = []; // {x, y, t0, dur, color, maxR}

  const offImg = new Image();
  const onImg = new Image();
  let imagesLoaded = 0;
  let maskBuilt = false;

  const state = {
    running: false,
    selectedColor: COLORS[0].hex,
    selectedHueOffset: 0,
    selectedMode: 'solid',
    pointers: new Map(),
    time: 0, last: 0,
    tiltX: 0, tiltY: 0,
    tiltTargetX: 0, tiltTargetY: 0,
    litFraction: 0,
    litLastSampled: 0,
    achievementShown: false,
    brushRadius: 3,        // adjustable 1-10 via slider
    fireworks: [],         // #3 — milestone bursts
    milestonesHit: new Set(), // tracks which thresholds fired
    lastHeli: 0,           // #13 — helicopter timer
    helicopters: [],
  };

  // ============= AUDIO =============
  const audio = { ctx: null, master: null, initialized: false };
  function initAudio() {
    if (audio.initialized) return;
    try {
      audio.ctx = new (window.AudioContext || window.webkitAudioContext)();
      audio.master = audio.ctx.createGain();
      audio.master.gain.value = 0.32;
      audio.master.connect(audio.ctx.destination);
      audio.initialized = true;
    } catch (e) {}
  }
  function playBlip(freq, dur = 0.18, type = 'square', vol = 0.12) {
    if (!audio.initialized) return;
    const t = audio.ctx.currentTime;
    const osc = audio.ctx.createOscillator();
    const g = audio.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.7, t + dur);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g); g.connect(audio.master);
    osc.start(t); osc.stop(t + dur + 0.05);
  }
  function colorToFreq(hex) {
    const idx = COLORS.findIndex(c => c.hex === hex);
    const scale = [261.63, 293.66, 329.63, 392, 440, 493.88];
    return scale[idx % scale.length] * 2;
  }

  // ============= RESIZE =============
  function resize() {
    const rect = canvas.getBoundingClientRect();
    DPR = Math.min(window.devicePixelRatio || 1, 3); // bumped 2 → 3 for retina sharpness
    W = rect.width; H = rect.height;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.imageSmoothingEnabled = false; // crisp pixel art

    litCanvas.width = W * DPR;
    litCanvas.height = H * DPR;
    litCtx.setTransform(DPR, 0, 0, DPR, 0, 0);

    tempCanvas.width = W * DPR;
    tempCanvas.height = H * DPR;
    tempCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
    tempCtx.imageSmoothingEnabled = false;

    // #14 — bloom scale 0.6 → 0.4: saves ~55% bloom render time, slightly softer halo
    const bloomScale = 0.4;
    bloomCanvas.width = Math.floor(W * DPR * bloomScale);
    bloomCanvas.height = Math.floor(H * DPR * bloomScale);
    bloomCanvas2.width = Math.floor(W * DPR * bloomScale);
    bloomCanvas2.height = Math.floor(H * DPR * bloomScale);
    flickerCanvas.width = W;
    flickerCanvas.height = H;

    if (offImg.complete && offImg.naturalWidth) imgFit = computeFit(offImg, W, H);
  }
  function computeFit(img, w, h) {
    const r = img.naturalWidth / img.naturalHeight;
    // Crop top 20% of sky — zoom image to 1.25x canvas height, align to bottom.
    // Lifts skyline upward into the space freed by hidden HUD.
    const fh = h * 1.25;
    const fw = fh * r;
    const fx = (w - fw) / 2;
    const fy = h - fh;  // bottom aligned, top overflows above canvas
    return { x: fx, y: fy, w: fw, h: fh };
  }

  // ============= IMAGE LOAD + WINDOW MASK =============
  function onImageReady() {
    imagesLoaded++;
    if (imagesLoaded === 2) {
      buildWindowMask();
      imgFit = computeFit(offImg, W, H);
      loadingEl.classList.add('hidden');
    }
  }
  offImg.onload = onImageReady;
  onImg.onload = onImageReady;
  offImg.onerror = () => loadingEl.textContent = 'skyline-off.png missing';
  onImg.onerror = () => loadingEl.textContent = 'skyline-on.png missing';
  offImg.src = 'skyline-off.png';
  onImg.src = 'skyline-on.png';

  // #11 — Mask compute in Web Worker (off main thread, no input freeze)
  // #12 — Cached to localStorage as PNG data URL keyed by image size signature
  const MASK_WORKER_SRC = `
    self.onmessage = (e) => {
      const { w, h, onBuf, offBuf } = e.data;
      // Wrap transferred ArrayBuffers back as typed arrays — indexing buf[i] returns undefined!
      const onData = new Uint8ClampedArray(onBuf);
      const offData = new Uint8ClampedArray(offBuf);
      const out = new Uint8ClampedArray(w * h * 4);
      const hits = new Uint8Array(w * h);
      const oceanStartY = Math.floor(h * 0.96);
      const lumOn = new Float32Array(w * h);
      const lumOff = new Float32Array(w * h);
      for (let i = 0, p = 0; i < w * h; i++, p += 4) {
        lumOn[i] = onData[p] * 0.299 + onData[p+1] * 0.587 + onData[p+2] * 0.114;
        lumOff[i] = offData[p] * 0.299 + offData[p+1] * 0.587 + offData[p+2] * 0.114;
      }
      const D = 4;
      const FAR = 12;
      const TOWER_TOP = Math.floor(h * 0.16);   // anything above = pure sky
      const CITY_TOP  = Math.floor(h * 0.34);   // below this = full city band rules
      const WATER_TOP = Math.floor(h * 0.78);   // below this = water (excluded)
      // Image-y [0.16..0.34] = upper-tower zone, ONLY paintable if structurally continuous
      // (tower antenna passes — vertical bright neighbors. Stars fail — isolated.)
      // Image-y [0.34..0.78] = full city band, all 4 paths apply.
      for (let y = TOWER_TOP; y < WATER_TOP; y++) {
        for (let x = D; x < w - D; x++) {
          const idx = y * w + x;
          const p4 = idx * 4;
          const lum = lumOn[idx];
          const diff = lum - lumOff[idx];
          const r = onData[p4], g = onData[p4+1], b = onData[p4+2];
          const max = Math.max(r, g, b);
          const min = Math.min(r, g, b);
          const satOn = max === 0 ? 0 : (max - min) / max;
          const or = offData[p4], og = offData[p4+1], ob = offData[p4+2];
          const offMax = Math.max(or, og, ob);
          const offMin = Math.min(or, og, ob);
          const satOff = offMax === 0 ? 0 : (offMax - offMin) / offMax;
          // Upper-tower zone: Sydney Tower silhouette only.
          // - inside x-band 0.42..0.50
          // - on-image bright OR significantly different from off
          // - off-image NOT moon glow (lum < 130)
          // (looser thresholds so tower antenna + pod actually catch)
          // GLOBAL GATE: pixel must have been DARK in off-image (building silhouette).
          // Sky/moon/clouds/stars are all bright in off → excluded.
          // Raised cap to 130 so lit tower pod (golden glow in off) still passes.
          if (lumOff[idx] > 130) continue;
          // Upper-tower zone (above CITY_TOP): only paint inside Sydney Tower x-band.
          if (y < CITY_TOP) {
            const xNorm = x / w;
            if (xNorm < 0.40 || xNorm > 0.54) continue;
            if (lum > 60 || diff > 15) {
              hits[idx] = 1;
              continue;
            }
            continue;
          }
          // City band paths:
          if (lum > 180) { hits[idx] = 1; continue; }
          if (diff > 35 && lum > 55) { hits[idx] = 1; continue; }
          if (satOn - satOff > 0.18 && lum > 50) { hits[idx] = 1; continue; }
          if (lum > 70) {
            const mortar = (lumOn[idx - D] + lumOn[idx + D] + lumOn[idx - D * w] + lumOn[idx + D * w]) * 0.25;
            if (lum - mortar > 25) hits[idx] = 1;
          }
        }
      }
      // Dilate 1px in all 8 directions — preserves thin structures (tower pole, antenna)
      // Erosion step removed: it was zapping 1-2px wide structures like the tower pole.
      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          const i = y * w + x;
          if (hits[i] ||
              hits[i - 1] || hits[i + 1] ||
              hits[i - w] || hits[i + w] ||
              hits[i - w - 1] || hits[i - w + 1] ||
              hits[i + w - 1] || hits[i + w + 1]) {
            const p = i * 4;
            out[p] = 255; out[p+1] = 255; out[p+2] = 255; out[p+3] = 255;
          }
        }
      }
      self.postMessage({ out }, [out.buffer]);
    };
  `;
  // Cached mask alpha array for fast lookup in paintAt (avoids getImageData per stroke)
  let maskAlpha = null;
  let maskW = 0, maskH = 0;
  function cacheMaskData() {
    maskW = maskCanvas.width;
    maskH = maskCanvas.height;
    const data = maskCtx.getImageData(0, 0, maskW, maskH).data;
    maskAlpha = new Uint8Array(maskW * maskH);
    for (let i = 0, j = 0; i < data.length; i += 4, j++) {
      maskAlpha[j] = data[i + 3];
    }
  }
  function isOverMask(canvasX, canvasY) {
    if (!maskAlpha || !imgFit.w) return true;  // no mask yet — allow
    // Convert canvas coords → mask (image) coords
    const ix = Math.floor((canvasX - imgFit.x) / imgFit.w * maskW);
    const iy = Math.floor((canvasY - imgFit.y) / imgFit.h * maskH);
    if (ix < 0 || ix >= maskW || iy < 0 || iy >= maskH) return false;
    return maskAlpha[iy * maskW + ix] > 0;
  }
  function cacheKey() {
    return `lutc-mask:${onImg.naturalWidth}x${onImg.naturalHeight}:v19-wide-tower`;
  }
  function buildWindowMask(cb) {
    const w = onImg.naturalWidth;
    const h = onImg.naturalHeight;
    maskCanvas.width = w;
    maskCanvas.height = h;

    // #12 — Cache check
    const cached = localStorage.getItem(cacheKey());
    if (cached) {
      const img = new Image();
      img.onload = () => {
        maskCtx.drawImage(img, 0, 0);
        cacheMaskData();
        maskBuilt = true;
        if (cb) cb();
      };
      img.src = cached;
      return;
    }

    const tmpOn = document.createElement('canvas');
    tmpOn.width = w; tmpOn.height = h;
    const tmpOff = document.createElement('canvas');
    tmpOff.width = w; tmpOff.height = h;
    tmpOn.getContext('2d').drawImage(onImg, 0, 0);
    tmpOff.getContext('2d').drawImage(offImg, 0, 0);
    const onData = tmpOn.getContext('2d').getImageData(0, 0, w, h).data;
    const offData = tmpOff.getContext('2d').getImageData(0, 0, w, h).data;

    // #11 — Run in worker so 1376x768 compute (~1M pixels) doesn't block UI
    const blob = new Blob([MASK_WORKER_SRC], { type: 'application/javascript' });
    const worker = new Worker(URL.createObjectURL(blob));
    worker.onmessage = (ev) => {
      const out = ev.data.out;
      const imgData = new ImageData(out, w, h);
      maskCtx.putImageData(imgData, 0, 0);
      cacheMaskData();
      maskBuilt = true;
      try {
        localStorage.setItem(cacheKey(), maskCanvas.toDataURL('image/png'));
      } catch (e) { /* quota exceeded - non-fatal */ }
      worker.terminate();
      if (cb) cb();
    };
    worker.postMessage({ w, h, onBuf: onData.buffer, offBuf: offData.buffer }, [onData.buffer, offData.buffer]);
  }

  // ============= COLOR + MODE UI =============
  function buildColorSwatches() {
    colorsEl.innerHTML = '';
    COLORS.forEach((c, i) => {
      const el = document.createElement('div');
      let cls = 'color-swatch' + (i === 0 ? ' active' : '');
      if (c.hex === 'rainbow') cls += ' rainbow';
      if (c.hex === 'eraser') cls += ' eraser';
      el.className = cls;
      if (c.hex === 'rainbow') {
        el.style.background = 'conic-gradient(#ff2bd6, #ffd23f, #39ff88, #00f0ff, #b14cff, #ff2bd6)';
      } else if (c.hex === 'custom') {
        el.style.background = 'conic-gradient(red, orange, yellow, green, cyan, blue, magenta, red)';
        el.title = 'Custom color';
      } else if (c.hex === 'eraser') {
        el.title = 'Eraser';
      } else {
        el.style.background = c.hex;
        el.style.color = c.hex;
      }
      el.dataset.hex = c.hex;
      el.dataset.idx = i;
      const handler = () => {
        if (c.hex === 'custom') {
          document.getElementById('hex-picker').click();
        } else {
          selectColor(c.hex, el);
        }
        // #5 — tap pulse animation
        el.classList.remove('tap-pulse');
        void el.offsetWidth;
        el.classList.add('tap-pulse');
      };
      el.addEventListener('click', handler);
      el.addEventListener('touchstart', e => { e.preventDefault(); handler(); }, { passive: false });
      colorsEl.appendChild(el);
    });
  }
  function selectColor(hex, el) {
    state.selectedColor = hex;
    const c = COLORS.find(c => c.hex === hex);
    state.selectedHueOffset = c ? c.hue - 320 : 0;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('active', s === el));
    playBlip(colorToFreq(hex) * 1.2, 0.06, 'sine', 0.06);
    // Update brush cursor color
    const cursor = document.getElementById('brush-cursor');
    if (cursor) {
      cursor.style.color = (hex === 'rainbow' || hex === 'eraser' || hex === 'custom') ? '#fff' : hex;
    }
  }
  // #10 — Custom hex picker integration
  const hexPicker = document.getElementById('hex-picker');
  hexPicker.addEventListener('input', e => {
    const hex = e.target.value;
    const customSwatch = document.querySelector('.color-swatch[data-hex="custom"]');
    if (customSwatch) {
      customSwatch.style.background = hex;
      customSwatch.dataset.hex = hex;
    }
    state.selectedColor = hex;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    if (customSwatch) customSwatch.classList.add('active');
  });
  // #5 — Brush size slider
  const brushSlider = document.getElementById('brush-slider');
  const brushVal = document.getElementById('brush-val');
  const brushCursor = document.getElementById('brush-cursor');
  function applyBrushSize(r) {
    state.brushRadius = r;
    brushVal.textContent = r;
    // #3 — sync cursor preview size
    if (brushCursor) {
      brushCursor.style.width = (r * 2) + 'px';
      brushCursor.style.height = (r * 2) + 'px';
    }
  }
  applyBrushSize(parseInt(brushSlider.value));
  brushSlider.addEventListener('input', e => {
    applyBrushSize(parseInt(e.target.value));
    // Flash cursor on slider drag near slider position
    if (brushCursor) {
      const rect = brushSlider.getBoundingClientRect();
      brushCursor.style.left = (rect.left + rect.width / 2) + 'px';
      brushCursor.style.top = (rect.top - 20) + 'px';
      brushCursor.classList.add('show');
      clearTimeout(state.cursorTimer);
      state.cursorTimer = setTimeout(() => brushCursor.classList.remove('show'), 600);
    }
  });
  // #3 — Track pointer for brush cursor on canvas
  canvas.addEventListener('pointermove', e => {
    if (brushCursor) {
      brushCursor.style.left = e.clientX + 'px';
      brushCursor.style.top = e.clientY + 'px';
      brushCursor.classList.add('show');
      clearTimeout(state.cursorTimer);
      state.cursorTimer = setTimeout(() => brushCursor.classList.remove('show'), 500);
    }
  });

  // #7 — Landmark tooltips via long-press (450ms)
  const tooltipEl = document.getElementById('tooltip');
  let holdTimer = null;
  function showLandmarkTooltip(x, y) {
    const fx = x / W, fy = y / H;
    for (const lm of LANDMARKS) {
      const dx = fx - lm.x, dy = fy - lm.y;
      if (dx * dx + dy * dy < lm.r * lm.r) {
        tooltipEl.textContent = lm.name;
        const r = canvas.getBoundingClientRect();
        tooltipEl.style.left = (r.left + x) + 'px';
        tooltipEl.style.top = (r.top + y - 30) + 'px';
        tooltipEl.style.transform = 'translate(-50%, 0)';
        tooltipEl.classList.add('show');
        setTimeout(() => tooltipEl.classList.remove('show'), 1800);
        return true;
      }
    }
    return false;
  }
  // Landmark naming disabled — no tooltips on long-press

  // #1 — Cascade triggered on tap in virgin tower (first paint of stroke)
  let lastCascadeX = -999, lastCascadeY = -999;
  function maybeTriggerCascade(x, y) {
    // Skip if eraser, or too close to last cascade origin
    if (state.selectedColor === 'eraser') return;
    const dx = x - lastCascadeX, dy = y - lastCascadeY;
    if (dx * dx + dy * dy < 50 * 50) return;
    // Only cascade if local litCanvas at (x,y) is mostly empty (virgin)
    const sample = litCtx.getImageData(Math.max(0, x - 8), Math.max(0, y - 8), 16, 16).data;
    let alpha = 0;
    for (let i = 3; i < sample.length; i += 4) alpha += sample[i];
    if (alpha > 800) return;  // already painted
    lastCascadeX = x; lastCascadeY = y;
    const hex = state.selectedColor === 'rainbow' ? '#ffffff' : state.selectedColor;
    cascadeTasks.push({ x, y, t0: state.time, dur: 0.8, color: hex, maxR: 60 });
  }
  function updateCascades() {
    for (let i = cascadeTasks.length - 1; i >= 0; i--) {
      const c = cascadeTasks[i];
      const age = state.time - c.t0;
      if (age >= c.dur) { cascadeTasks.splice(i, 1); continue; }
      const p = age / c.dur;
      const r = p * c.maxR;
      // Paint a ring at radius r
      const ringPts = 16;
      const prevColor = state.selectedColor;
      // Direct paint to lit canvas using the cascade color
      const useHex = c.color;
      for (let j = 0; j < ringPts; j++) {
        const ang = (j / ringPts) * Math.PI * 2;
        const rx = c.x + Math.cos(ang) * r;
        const ry = c.y + Math.sin(ang) * r;
        if (rx < 0 || rx >= W || ry < 0 || ry >= H * WATER_LINE) continue;
        const grad = litCtx.createRadialGradient(rx, ry, 0, rx, ry, 6);
        grad.addColorStop(0, useHex);
        grad.addColorStop(0.5, useHex);
        grad.addColorStop(1, useHex + '00');
        litCtx.fillStyle = grad;
        litCtx.beginPath();
        litCtx.arc(rx, ry, 6, 0, Math.PI * 2);
        litCtx.fill();
      }
    }
  }

  // #10 — Lightning storm: rare distant flash every 60-120s
  let nextLightning = 25 + Math.random() * 30;
  function maybeLightning() {
    if (state.time < nextLightning) return;
    nextLightning = state.time + 60 + Math.random() * 60;
    const flash = document.createElement('div');
    flash.className = 'lightning-flash';
    document.getElementById('app').appendChild(flash);
    setTimeout(() => flash.remove(), 500);
    playBlip(60, 0.8, 'sawtooth', 0.08);
  }

  // #15 — Shooting stars: rare meteor streak across upper sky
  const shootingStars = []; // {x, y, vx, vy, life, ttl}
  let nextShootingStar = 8 + Math.random() * 30;
  function maybeShootingStar() {
    if (state.time < nextShootingStar) return;
    nextShootingStar = state.time + 20 + Math.random() * 50;
    const fromLeft = Math.random() < 0.5;
    shootingStars.push({
      x: fromLeft ? -30 : W + 30,
      y: 30 + Math.random() * (H * 0.25),
      vx: fromLeft ? 260 + Math.random() * 80 : -(260 + Math.random() * 80),
      vy: 60 + Math.random() * 50,
      life: 0,
      ttl: 0.9,
    });
  }
  function updateShootingStars(dt) {
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const s = shootingStars[i];
      s.life += dt;
      if (s.life >= s.ttl) { shootingStars.splice(i, 1); continue; }
      s.x += s.vx * dt;
      s.y += s.vy * dt;
    }
  }
  function drawShootingStars() {
    if (shootingStars.length === 0) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const s of shootingStars) {
      const a = Math.max(0, 1 - s.life / s.ttl);
      const tailLen = 24;
      const tx = s.x - s.vx * 0.025;
      const ty = s.y - s.vy * 0.025;
      const grad = ctx.createLinearGradient(tx, ty, s.x, s.y);
      grad.addColorStop(0, 'rgba(255,255,255,0)');
      grad.addColorStop(0.7, `rgba(255,255,255,${a * 0.55})`);
      grad.addColorStop(1, `rgba(255,255,255,${a})`);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(s.x, s.y);
      ctx.stroke();
      // Bright head
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 1.6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // #2 — Spotlight beam rotating from Sydney Tower top
  function drawSpotlight() {
    if (!imgFit.w) return;
    // Tower top roughly at image coords (0.46, 0.20) → canvas coords via imgFit
    const tx = imgFit.x + imgFit.w * 0.46;
    const ty = imgFit.y + imgFit.h * 0.205;
    // Rotation: 8s per full revolution
    const ang = (state.time * (Math.PI * 2) / 8) % (Math.PI * 2);
    // Two opposite cones
    ctx.save();
    ctx.translate(tx, ty);
    ctx.globalCompositeOperation = 'lighter';
    for (let k = 0; k < 2; k++) {
      ctx.save();
      ctx.rotate(ang + k * Math.PI);
      const reach = Math.max(W, H) * 0.7;
      const half = Math.PI * 0.05; // cone half-angle
      const grad = ctx.createLinearGradient(0, 0, reach, 0);
      grad.addColorStop(0, 'rgba(255,240,180,0.35)');
      grad.addColorStop(0.5, 'rgba(255,240,180,0.10)');
      grad.addColorStop(1, 'rgba(255,240,180,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(half) * reach, Math.sin(half) * reach);
      ctx.lineTo(Math.cos(-half) * reach, Math.sin(-half) * reach);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  // #9 — Time-attack mode (30s, score = % lit at end)

  // #9 — Aurora bands at 100% lit (reward)
  function drawAuroraFinale() {
    if ((state.litFraction || 0) < 0.95) return;
    const ribbonH = H * 0.32;
    const offset = (Math.sin(state.time * 0.2) + 1) * 0.5;
    const grad = ctx.createLinearGradient(0, 0, W, 0);
    grad.addColorStop(0, 'rgba(57,255,136,0)');
    grad.addColorStop(Math.max(0, offset - 0.3), 'rgba(57,255,136,0.10)');
    grad.addColorStop(offset, 'rgba(0,240,255,0.16)');
    grad.addColorStop(Math.min(1, offset + 0.3), 'rgba(177,76,255,0.12)');
    grad.addColorStop(1, 'rgba(255,43,214,0)');
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, ribbonH);
    ctx.restore();
  }

  // #2 — Save / Share painted result
  async function shareImage() {
    canvas.toBlob(async blob => {
      if (!blob) return;
      const file = new File([blob], 'light-up-sydney.png', { type: 'image/png' });
      // Try native share first
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: 'Light Up The City', text: `${Math.round((state.litFraction || 0) * 100)}% lit in Vivid Sydney` });
          return;
        } catch (_) {}
      }
      // Fallback: download
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'light-up-sydney.png';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, 'image/png');
  }
  function selectMode(mode, el) {
    state.selectedMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b === el));
  }
  document.querySelectorAll('.mode-btn').forEach(btn => {
    const handler = () => selectMode(btn.dataset.mode, btn);

  // ============= PAINT — PIXEL-PRECISE =============
  // Light-up burst particles — sparkle pixels at finger drag
  const particles = [];
  function spawnParticles(x, y, hex) {
    const n = 3 + (Math.random() * 3) | 0;
    for (let i = 0; i < n; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 80,
        vy: (Math.random() - 0.5) * 80 - 30,
        life: 1.0,
        color: hex,
      });
    }
  }
  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 90 * dt;
      p.life -= dt * 2.4;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }
  function drawParticles() {
    if (!particles.length) return;
    ctx.save();
    for (const p of particles) {
      const a = Math.max(0, p.life);
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      const s = a > 0.5 ? 3 : 2;
      ctx.fillRect((p.x - s/2) | 0, (p.y - s/2) | 0, s, s);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  const WATER_LINE = 0.78;  // matches mask water-top — paint never enters water
  function paintAt(x, y) {
    if (!state.running || !maskBuilt) return;
    if (y >= H * WATER_LINE) return;  // block painting on water
    // Gate paint+particles+flickers by mask position. If brush over sky → no spawn anything.
    if (!isOverMask(x, y)) return;
    const radius = state.brushRadius;  // #5 — slider-controlled
    // #4 — Eraser: subtract from lit layer
    if (state.selectedColor === 'eraser') {
      litCtx.globalCompositeOperation = 'destination-out';
      litCtx.beginPath();
      litCtx.arc(x, y, radius, 0, Math.PI * 2);
      litCtx.fillStyle = '#000';
      litCtx.fill();
      litCtx.globalCompositeOperation = 'source-over';
      return;
    }
    const hex = state.selectedColor === 'rainbow' ? '#ffffff' : state.selectedColor;
    // Color halo — soft falloff
    const grad = litCtx.createRadialGradient(x, y, 0, x, y, radius);
    grad.addColorStop(0, hex);
    grad.addColorStop(0.5, hex);
    grad.addColorStop(1, hex + '00');
    litCtx.globalCompositeOperation = 'source-over';
    litCtx.fillStyle = grad;
    litCtx.beginPath();
    litCtx.arc(x, y, radius, 0, Math.PI * 2);
    litCtx.fill();
    // Hot white core — adds a 1-2px peak-bright pixel cluster at brush center.
    litCtx.globalCompositeOperation = 'lighter';
    const coreR = Math.max(1, Math.min(radius * 0.35, 4));
    const coreGrad = litCtx.createRadialGradient(x, y, 0, x, y, coreR);
    coreGrad.addColorStop(0, '#ffffff');
    coreGrad.addColorStop(0.5, hex);
    coreGrad.addColorStop(1, hex + '00');
    litCtx.fillStyle = coreGrad;
    litCtx.beginPath();
    litCtx.arc(x, y, coreR, 0, Math.PI * 2);
    litCtx.fill();
    litCtx.globalCompositeOperation = 'source-over';

    if (Math.random() < 0.35) {
      const partColor = state.selectedColor === 'rainbow'
        ? COLORS[(Math.random() * 6) | 0].hex
        : hex;
      spawnParticles(x, y, partColor);
    }
    if (Math.random() < 0.1) {
      playBlip(colorToFreq(hex) * (0.9 + Math.random() * 0.4), 0.06, 'square', 0.04);
    }
    // #1 — window flicker burst (capped to avoid memory bloat)
    if (flickers.length < 200 && Math.random() < 0.55) {
      flickers.push({ x, y, t: state.time, dur: 0.22 + Math.random() * 0.15, color: hex });
    }
    // Throttled live sample so lit-counter updates immediately
    state.paintTicks = (state.paintTicks || 0) + 1;
    if (state.paintTicks % 20 === 0) {
      sampleLitFraction();
    }
  }
  function paintLine(x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const dist = Math.sqrt(dx * dx + dy * dy);
    // #9 — sub-pixel smoothing: step every 1 pixel
    const steps = Math.max(1, Math.ceil(dist));
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      paintAt(x1 + dx * t, y1 + dy * t);
    }
  }

  // ============= RESET + SAVE =============
  function resetSkyline() {
    litCtx.clearRect(0, 0, W, H);
    flickers.length = 0;
    particles.length = 0;
    state.litFraction = 0;
    state.achievementShown = false;
    document.getElementById('lit-counter').textContent = '0%';
    document.getElementById('lit-counter').classList.remove('high');
    document.getElementById('achievement').classList.add('hidden');
    document.getElementById('lights-badge').classList.add('off');

    playBlip(220, 0.4, 'sawtooth', 0.1);
  }
  function saveImage() {
    // #2 — try native share first, fallback to download
    playBlip(880, 0.18, 'sine', 0.12);
    shareImage();
  }
  resetBtn.addEventListener('click', e => { e.stopPropagation(); resetSkyline(); });
  saveBtn.addEventListener('click', e => { e.stopPropagation(); saveImage(); });
  resetBtn.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); resetSkyline(); }, { passive: false });
  saveBtn.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); saveImage(); }, { passive: false });

  // ============= POINTER =============
  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
    const p = getPos(e);
    state.pointers.set(e.pointerId, { x: p.x, y: p.y });
    paintAt(p.x, p.y);
    // #1 — Haptic feedback on touch start (Android; iOS Safari silently ignores)
    if (navigator.vibrate) navigator.vibrate(6);
  });
  canvas.addEventListener('pointermove', e => {
    if (!state.pointers.has(e.pointerId)) return;
    const p = getPos(e);
    const last = state.pointers.get(e.pointerId);
    paintLine(last.x, last.y, p.x, p.y);
    state.pointers.set(e.pointerId, { x: p.x, y: p.y });
  });
  function endPointer(e) { state.pointers.delete(e.pointerId); }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  canvas.addEventListener('pointerleave', endPointer);

  // Tilt disabled — screen stays stable
  function enableTilt() {}

  // ============= START =============
  function start() {
    initAudio();
    enableTilt();
    resize();
    state.running = true;
    titleScreen.classList.add('hidden');
    hintEl.classList.remove('fade');

  // Music: starts MUTED by default. Tap ♫ to unmute. State persisted per visit.

  const musicBtn = document.getElementById('music-toggle');
  const stored = localStorage.getItem('lutc-music-muted');
  // Default = muted (unless user previously unmuted)

      }

  }
  // #9 — Time Attack button wiring
  document.getElementById('ta-btn').addEventListener('click', startTimeAttack);
  document.getElementById('ta-btn').addEventListener('touchstart', e => { e.preventDefault(); startTimeAttack(); }, { passive: false });
  document.getElementById('ta-again').addEventListener('click', () => {

  document.getElementById('ta-close').addEventListener('click', () => {

  });
  function showFirstTimeHint() {
    const el = document.createElement('div');
    el.innerHTML = '<div>DRAG TO PAINT</div><div>PICK COLOR ↓</div><div>SLIDE BRUSH SIZE ↓</div>';
    el.style.cssText = 'position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px;background:rgba(4,0,22,0.55);backdrop-filter:blur(2px);z-index:45;pointer-events:none;font-family:Courier New,monospace;color:#fff;font-size:18px;font-weight:bold;letter-spacing:3px;text-shadow:0 0 8px var(--neon-cyan),0 0 16px var(--neon-pink);animation:tap-flash 4s ease-out forwards;';
    document.getElementById('app').appendChild(el);

  }
  titleScreen.addEventListener('click', start);
  titleScreen.addEventListener('touchstart', e => { e.preventDefault(); start(); }, { passive: false });
  window.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !state.running) start();
    const n = parseInt(e.key);
    if (n >= 1 && n <= COLORS.length) {
      const sw = document.querySelectorAll('.color-swatch');
      selectColor(COLORS[n - 1].hex, sw[n - 1]);
    }
  });
  window.addEventListener('resize', resize);

  // ============= RENDER =============
  function modeFilter() {
    if (state.selectedMode === 'cycle') return `hue-rotate(${state.time * 30}deg) saturate(1.2)`;
    if (state.selectedMode === 'disco') return `hue-rotate(${state.time * 240}deg) saturate(1.5)`;
    return '';
  }
  function render() {
    // Auto effects disabled — static camera, no tilt drift
    const px = 0;
    const py = 0;

    ctx.clearRect(0, 0, W, H);

    if (!maskBuilt) {
      ctx.fillStyle = '#040016';
      ctx.fillRect(0, 0, W, H);
      return;
    }

    // Base = DARK Sydney
    ctx.drawImage(offImg, imgFit.x + px, imgFit.y + py, imgFit.w, imgFit.h);
    // Ambient: hint of vivid baked into base (player sees glimmer of color even unpainted)
    ctx.save();
    ctx.globalAlpha = 0.28;
    ctx.drawImage(onImg, imgFit.x + px, imgFit.y + py, imgFit.w, imgFit.h);
    ctx.globalAlpha = 1;
    ctx.restore();

    // #8 — Cloud drift overlay
    drawCloudDrift();
    // Stars with varied brightness
    drawStars();
    // Sydney Tower beacon blink
    drawTowerBeacon();
    // #13 — Helicopter
    drawHelicopters();

    // Build painted layer.
    // Rainbow swatch: reveal full multi-color on-image.
    // Single color swatch: ONLY that color appears at lit-window positions.
    tempCtx.clearRect(0, 0, W, H);
    if (state.selectedColor === 'rainbow') {
      tempCtx.drawImage(onImg, imgFit.x + px, imgFit.y + py, imgFit.w, imgFit.h);
      tempCtx.globalCompositeOperation = 'destination-in';
      tempCtx.drawImage(litCanvas, 0, 0, W, H);
    } else {
      // user color clipped to (paint shape ∩ window mask)
      tempCtx.drawImage(litCanvas, 0, 0, W, H);
      tempCtx.globalCompositeOperation = 'destination-in';
      tempCtx.drawImage(maskCanvas, imgFit.x + px, imgFit.y + py, imgFit.w, imgFit.h);
    }
    tempCtx.globalCompositeOperation = 'source-over';

    // Wall-bleed REMOVED — color stays sharp on object pixels only
    // Crisp paint pass — no blur, additive overlap blend, super-bright
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.globalCompositeOperation = 'lighter';
    ctx.filter = 'saturate(2.0) brightness(1.7) contrast(1.15)';
    ctx.drawImage(tempCanvas, 0, 0, W, H);
    ctx.filter = 'none';
    ctx.globalCompositeOperation = 'source-over';
    ctx.imageSmoothingEnabled = true;
    ctx.restore();

    // #1 — flicker bursts on freshly-painted windows
    drawFlickers();

    // Water reflection — flip the painted layer vertically into water area, fade + horizontal jitter
    drawWaterReflection();
    // #3 — vertical LED columns streaking into water
    drawLightColumns();
    // Caustic ripples in water
    drawCausticRipples();
    // #14 — Ferry shimmer
    drawFerryShimmer();

    // Bloom removed — paint stays razor sharp on mask pixels only
    drawWindowTwinkle();
    drawParticles();
    // #3 — Fireworks (above everything except vignette)
    drawFireworks();
    drawShootingStars();
    // Spotlight beam removed
    drawAuroraFinale();
    applyVignette();

    // Periodically sample lit fraction (every ~0.5s)
    if (state.time - (state.litLastSampled || 0) > 0.5) {
      sampleLitFraction();
      state.litLastSampled = state.time;
    }
  }

  function sampleLitFraction() {
    // litCanvas backing store is W*DPR x H*DPR — sample full area not just transformed
    const lw = litCanvas.width, lh = litCanvas.height;
    const d = litCtx.getImageData(0, 0, lw, lh).data;
    let lit = 0;
    for (let i = 3; i < d.length; i += 4) if (d[i] > 50) lit++;
    const frac = Math.min(1, lit / (lw * lh * 0.42));  // 42% = approx paintable area
    state.litFraction = frac;
    const pct = Math.round(frac * 100);
    const el = document.getElementById('lit-counter');
    el.textContent = pct + '%';
    el.classList.toggle('high', pct >= 50);
    if (pct >= 5) {
      document.getElementById('lights-badge').classList.remove('off');
      document.getElementById('lights-text').textContent = 'Painting';
    }
    // #3 — fireworks at milestones (25%, 50%, 100%)
    const milestones = [25, 50, 100];
    for (const m of milestones) {
      if (pct >= m && !state.milestonesHit.has(m)) {
        state.milestonesHit.add(m);
        spawnFirework(m);
      }
    }
  }

  // #3 — Fireworks burst at milestones (#6 — extra finale at 100%)
  function spawnFirework(milestone) {
    const bursts = milestone === 100 ? 16 : milestone === 50 ? 4 : 2;
    if (milestone === 100) {
      // #6 — celebration text overlay
      const el = document.createElement('div');
      el.textContent = 'MASTERPIECE';
      el.style.cssText = 'position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-family:Courier New,monospace;font-size:32px;font-weight:bold;color:#ffd23f;text-shadow:0 0 12px #ff2bd6,0 0 24px #00f0ff;z-index:40;pointer-events:none;animation:tap-flash 2s ease-out;letter-spacing:4px;';
      document.getElementById('app').appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }
    for (let b = 0; b < bursts; b++) {
      setTimeout(() => {
        const fx = 60 + Math.random() * (W - 120);
        const fy = 80 + Math.random() * (H * 0.35);
        const palette = ['#ff2bd6', '#00f0ff', '#ffd23f', '#b14cff', '#39ff88'];
        const color = palette[(Math.random() * palette.length) | 0];
        const count = 28 + (Math.random() * 16) | 0;
        for (let i = 0; i < count; i++) {
          const ang = (i / count) * Math.PI * 2 + Math.random() * 0.3;
          const spd = 80 + Math.random() * 80;
          state.fireworks.push({
            x: fx, y: fy,
            vx: Math.cos(ang) * spd,
            vy: Math.sin(ang) * spd,
            color, life: 0, ttl: 1.0 + Math.random() * 0.6,
          });
        }
        playBlip(120 + b * 40, 0.5, 'triangle', 0.12);
      }, b * 280);
    }
  }
  function updateFireworks(dt) {
    for (let i = state.fireworks.length - 1; i >= 0; i--) {
      const f = state.fireworks[i];
      f.life += dt;
      if (f.life >= f.ttl) { state.fireworks.splice(i, 1); continue; }
      f.x += f.vx * dt;
      f.y += f.vy * dt;
      f.vy += 60 * dt;  // gravity
      f.vx *= 0.98; f.vy *= 0.98;
    }
  }
  function drawFireworks() {
    if (state.fireworks.length === 0) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const f of state.fireworks) {
      const a = Math.max(0, 1 - f.life / f.ttl);
      ctx.globalAlpha = a;
      ctx.fillStyle = f.color;
      ctx.beginPath();
      ctx.arc(f.x, f.y, 2, 0, Math.PI * 2);
      ctx.fill();
      // trail
      ctx.globalAlpha = a * 0.5;
      ctx.beginPath();
      ctx.arc(f.x - f.vx * 0.03, f.y - f.vy * 0.03, 1.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // #13 — Helicopter crosses sky every 20s
  function maybeSpawnHelicopter() {
    if (state.time - state.lastHeli >= 20) {
      state.lastHeli = state.time;
      state.helicopters.push({
        x: -20,
        y: 10 + Math.random() * (H * 0.10),  // high up in sky, well above buildings
        speed: 30 + Math.random() * 20,
        blinkPhase: 0,
      });
    }
  }
  function updateHelicopters(dt) {
    for (let i = state.helicopters.length - 1; i >= 0; i--) {
      const h = state.helicopters[i];
      h.x += h.speed * dt;
      h.blinkPhase += dt * 5;
      if (h.x > W + 20) state.helicopters.splice(i, 1);
    }
  }
  function drawHelicopters() {
    for (const h of state.helicopters) {
      ctx.save();
      // body (tiny dark silhouette)
      ctx.fillStyle = 'rgba(20,20,30,0.7)';
      ctx.fillRect(h.x - 3, h.y, 6, 2);
      ctx.fillRect(h.x - 1, h.y - 2, 2, 2);
      // blinking red navigation light
      const blink = (Math.sin(h.blinkPhase) + 1) * 0.5;
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = blink;
      ctx.fillStyle = '#ff2233';
      ctx.beginPath();
      ctx.arc(h.x, h.y + 1, 2, 0, Math.PI * 2);
      ctx.fill();
      // subtle glow
      ctx.globalAlpha = blink * 0.4;
      ctx.beginPath();
      ctx.arc(h.x, h.y + 1, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // #14 — Ferry shimmer overlay: subtle horizontal bands on water that pulse
  function drawFerryShimmer() {
    const ferries = [
      { x: 0.10, y: 0.92, len: 0.10, color: '#ffd23f', phase: 0 },
      { x: 0.55, y: 0.88, len: 0.08, color: '#fff5d0', phase: 1.3 },
      { x: 0.30, y: 0.95, len: 0.07, color: '#ffd23f', phase: 2.7 },
      { x: 0.80, y: 0.86, len: 0.06, color: '#fff5d0', phase: 4.1 },
    ];
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const f of ferries) {
      const pulse = 0.6 + 0.4 * Math.sin(state.time * 1.5 + f.phase);
      ctx.globalAlpha = 0.6 * pulse;
      ctx.fillStyle = f.color;
      const fx = f.x * W;
      const fy = f.y * H;
      const fl = f.len * W;
      ctx.fillRect(fx, fy, fl, 1.5);
      // bright cabin window dots
      ctx.globalAlpha = pulse;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc(fx + (i + 0.5) * fl / 4, fy - 1, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  }

  // #8 — Cloud parallax drift overlay (very subtle, doesn't break "no flashy auto")
  // Pre-cache a low-res cloud strip from off-image top portion
  let cloudStripCanvas = null;
  function buildCloudStrip() {
    if (cloudStripCanvas) return;
    const cw = offImg.naturalWidth;
    const ch = Math.floor(offImg.naturalHeight * 0.25);
    cloudStripCanvas = document.createElement('canvas');
    cloudStripCanvas.width = cw;
    cloudStripCanvas.height = ch;
    cloudStripCanvas.getContext('2d').drawImage(offImg, 0, 0, cw, ch, 0, 0, cw, ch);
  }
  function drawCloudDrift() {
    if (state.lowFps) return;  // #15 — skip on low-end devices
    if (!cloudStripCanvas) buildCloudStrip();
    if (!cloudStripCanvas) return;
    const offset = (state.time * 4) % W;
    const cloudH = H * 0.25;
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.drawImage(cloudStripCanvas, -offset, 0, W, cloudH);
    ctx.drawImage(cloudStripCanvas, W - offset, 0, W, cloudH);
    ctx.restore();
  }

  // #7 — Window twinkle: subtle alpha jitter on painted layer (only after some paint exists)
  function drawWindowTwinkle() {
    if (!state.litFraction || state.litFraction < 0.02) return;
    const twinkle = 0.92 + 0.08 * Math.sin(state.time * 2.3);
    ctx.save();
    ctx.globalAlpha = (1 - twinkle) * 1.2;
    ctx.globalCompositeOperation = 'lighter';
    ctx.drawImage(tempCanvas, 0, 0, W, H);
    ctx.restore();
  }

  // Water reflection — vertically mirror painted lights into water area with wave jitter
  function drawWaterReflection() {
    const waterY = H * WATER_LINE;
    const waterH = H - waterY;
    if (waterH < 4) return;
    const reflectableH = Math.min(waterY * 0.55, waterH);

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    // #7 — brightness scales with paint amount (subtle, capped)
    const dens = state.litFraction || 0;
    const brightnessBoost = 1 + dens * 0.6;     // 1.0 → 1.6
    const alphaBoost = 1 + dens * 0.5;          // 1.0 → 1.5
    const sliceCount = 28;
    const sliceH = reflectableH / sliceCount;
    for (let i = 0; i < sliceCount; i++) {
      const srcY = waterY - reflectableH + i * sliceH;
      const dstY = waterY + (sliceCount - 1 - i) * sliceH;
      if (dstY >= H) break;
      const fade = Math.pow(1 - i / sliceCount, 1.6) * 0.55 * alphaBoost;
      // #9 — Per-row ripple displacement: deeper rows wave more, mixed sin/cos for organic motion
      const depth = i / sliceCount;
      const jitter = (Math.sin(state.time * 1.8 + i * 0.6) * 3 + Math.cos(state.time * 1.1 + i * 0.3) * 2) * (1 + depth * 1.2);
      ctx.globalAlpha = Math.min(1, fade);
      ctx.drawImage(tempCanvas, 0, srcY, W, sliceH, jitter, dstY, W, Math.min(sliceH, H - dstY));
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();

    // #8 — Color tint wash: dominant painted color subtly tints harbour surface
    if (dens > 0.05) {
      const dom = state.selectedColor;
      if (dom && dom !== 'eraser' && dom.startsWith('#')) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const grad = ctx.createLinearGradient(0, waterY, 0, H);
        grad.addColorStop(0, dom + Math.round(Math.min(60, dens * 90)).toString(16).padStart(2, '0'));
        grad.addColorStop(1, dom + '00');
        ctx.fillStyle = grad;
        ctx.fillRect(0, waterY, W, waterH);
        ctx.restore();
      }
    }
  }

  // #1 — drawFlickers: short white shimmer at fresh paint locations
  function drawFlickers() {
    if (flickers.length === 0) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const now = state.time;
    for (let i = flickers.length - 1; i >= 0; i--) {
      const f = flickers[i];
      const age = now - f.t;
      if (age >= f.dur) { flickers.splice(i, 1); continue; }
      const p = age / f.dur;
      const alpha = (1 - p) * (0.5 + 0.5 * Math.sin(age * 60));
      const rad = 3 + p * 4;
      const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, rad);
      grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
      grad.addColorStop(0.5, f.color);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(f.x, f.y, rad, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // #3 — vertical light columns: bright windows above water leak downward into harbour
  function drawLightColumns() {
    const waterY = Math.floor(H * WATER_LINE);
    if (waterY >= H - 4) return;
    // Sample 1px-tall strip just above waterline; find bright columns
    const strip = tempCtx.getImageData(0, Math.max(0, waterY - 3), W, 3).data;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let x = 0; x < W; x += 2) {
      // Avg the 3 rows for the column
      let r = 0, g = 0, b = 0, n = 0;
      for (let row = 0; row < 3; row++) {
        const i = (row * W + x) * 4;
        if (strip[i + 3] > 30) {
          r += strip[i]; g += strip[i + 1]; b += strip[i + 2]; n++;
        }
      }
      if (n === 0) continue;
      r /= n; g /= n; b /= n;
      const lum = r * 0.299 + g * 0.587 + b * 0.114;
      if (lum < 80) continue;
      // Draw vertical streak down into water, fading
      const streakH = Math.min(H - waterY, 60 + lum * 0.3);
      const grad = ctx.createLinearGradient(0, waterY, 0, waterY + streakH);
      grad.addColorStop(0, `rgba(${r|0},${g|0},${b|0},0.55)`);
      grad.addColorStop(0.5, `rgba(${r|0},${g|0},${b|0},0.18)`);
      grad.addColorStop(1, `rgba(${r|0},${g|0},${b|0},0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(x, waterY, 2, streakH);
    }
    ctx.restore();
  }

  function showAchievement(pct) {
    document.getElementById('ach-stat').textContent = pct + '% lit · A masterpiece';
    document.getElementById('achievement').classList.remove('hidden');
    // sparkle audio
    playBlip(880, 0.4, 'sine', 0.15);
    setTimeout(() => playBlip(1320, 0.4, 'sine', 0.13), 120);
    setTimeout(() => playBlip(1760, 0.5, 'sine', 0.12), 240);
  }

  // Procedural star twinkle — seeded once, refreshed alpha per frame
  // #8 — Stars with varied brightness, sizes 1-3px, mix bright + dim
  const STARS = (() => {
    const arr = [];
    for (let i = 0; i < 90; i++) {
      const r = Math.random();
      arr.push({
        x: Math.random(),
        y: Math.random() * 0.30,
        size: r < 0.65 ? 1 : (r < 0.92 ? 2 : 3),
        baseAlpha: r < 0.55 ? 0.25 + Math.random() * 0.3 : 0.6 + Math.random() * 0.4,
        phase: Math.random() * Math.PI * 2,
        speed: 0.4 + Math.random() * 1.4,
      });
    }
    return arr;
  })();
  function drawStars() {
    ctx.save();
    for (const s of STARS) {
      const twinkle = 0.7 + 0.3 * Math.sin(state.time * s.speed + s.phase);
      ctx.globalAlpha = s.baseAlpha * twinkle;
      ctx.fillStyle = '#fff';
      const x = s.x * W, y = s.y * H;
      ctx.fillRect(x, y, s.size, s.size);
      // Bright stars get a 1px halo
      if (s.size >= 2 && s.baseAlpha > 0.7) {
        ctx.globalAlpha = s.baseAlpha * twinkle * 0.3;
        ctx.fillRect(x - 1, y, 1, s.size);
        ctx.fillRect(x + s.size, y, 1, s.size);
        ctx.fillRect(x, y - 1, s.size, 1);
        ctx.fillRect(x, y + s.size, s.size, 1);
      }
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // #1 — Sydney Tower beacon: red dot at antenna tip blinks every 1.5s
  function drawTowerBeacon() {
    if (!imgFit.w) return;
    // Tower antenna tip at image coords (0.46, 0.185)
    const tx = imgFit.x + imgFit.w * 0.46;
    const ty = imgFit.y + imgFit.h * 0.185;
    // Blink pattern: ON 0.25s, OFF 1.25s
    const t = state.time % 1.5;
    if (t > 0.25) return;
    const intensity = Math.sin((t / 0.25) * Math.PI);  // smooth in-out
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    // Hot core
    ctx.fillStyle = `rgba(255,40,40,${intensity})`;
    ctx.beginPath();
    ctx.arc(tx, ty, 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Soft halo
    const grad = ctx.createRadialGradient(tx, ty, 0, tx, ty, 8);
    grad.addColorStop(0, `rgba(255,60,60,${intensity * 0.7})`);
    grad.addColorStop(1, 'rgba(255,60,60,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(tx, ty, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // #6 — Caustic ripples in harbour water: bright sin-wave bands
  function drawCausticRipples() {
    const waterY = H * WATER_LINE;
    if (waterY >= H - 4) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    // 3 horizontal caustic bands drifting at different speeds
    const bands = [
      { y: waterY + (H - waterY) * 0.18, speed: 0.7, phase: 0, alpha: 0.08 },
      { y: waterY + (H - waterY) * 0.45, speed: 0.5, phase: 1.2, alpha: 0.06 },
      { y: waterY + (H - waterY) * 0.72, speed: 0.6, phase: 2.4, alpha: 0.05 },
    ];
    for (const b of bands) {
      for (let x = 0; x < W; x += 4) {
        const wave = Math.sin(x * 0.06 + state.time * b.speed + b.phase);
        if (wave < 0.55) continue;
        const a = (wave - 0.55) / 0.45 * b.alpha;
        ctx.fillStyle = `rgba(180,220,255,${a})`;
        ctx.fillRect(x, b.y - 1, 4, 2);
      }
    }
    ctx.restore();
  }

  // Aurora ribbon — animated cyan/purple gradient sweep top 30%
  function drawAurora() {
    const ribbonH = H * 0.30;
    const offset = (Math.sin(state.time * 0.15) + 1) * 0.5;
    const grad = ctx.createLinearGradient(0, 0, W, 0);
    grad.addColorStop(0, 'rgba(0,240,255,0)');
    grad.addColorStop(Math.max(0, offset - 0.25), 'rgba(0,240,255,0.05)');
    grad.addColorStop(offset, 'rgba(177,76,255,0.10)');
    grad.addColorStop(Math.min(1, offset + 0.25), 'rgba(255,43,214,0.05)');
    grad.addColorStop(1, 'rgba(255,43,214,0)');
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, ribbonH);
    ctx.restore();
  }

  function applyBloom() {
    const bw = bloomCanvas.width;
    const bh = bloomCanvas.height;
    // Source = brightened painted layer
    bloomCtx.clearRect(0, 0, bw, bh);
    bloomCtx.filter = 'brightness(1.7) saturate(1.6)';
    bloomCtx.drawImage(tempCanvas, 0, 0, bw, bh);
    bloomCtx.filter = 'none';
    // Tight halo only — keeps glow ON the object pixels, no sky bleed
    bloomCtx2.clearRect(0, 0, bw, bh);
    bloomCtx2.filter = 'blur(2px)';
    bloomCtx2.drawImage(bloomCanvas, 0, 0);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.7;
    ctx.drawImage(bloomCanvas2, 0, 0, W, H);
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
  }
  function applyVignette() {
    const grad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.4, W / 2, H / 2, Math.max(W, H) * 0.78);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.7, 'rgba(0,0,0,0.22)');
    grad.addColorStop(1, 'rgba(0,0,0,0.65)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  function loop(ts) {
    const dt = Math.min(0.05, (ts - state.last) / 1000 || 0);
    state.last = ts;
    state.time += dt;
    // #15 — rolling FPS estimate, drop heavy atmospherics on low-end
    state.dtAvg = state.dtAvg ? state.dtAvg * 0.92 + dt * 0.08 : dt;
    state.lowFps = state.dtAvg > 0.033;  // < 30fps
    updateParticles(dt);
    updateFireworks(dt);
    maybeSpawnHelicopter();
    updateHelicopters(dt);
    updateCascades();
    maybeLightning();
    maybeShootingStar();
    updateShootingStars(dt);
    updateTimeAttack(dt);
    render();
    requestAnimationFrame(loop);
  }

  // Achievement modal buttons
  document.getElementById('ach-close').addEventListener('click', () => {
    document.getElementById('achievement').classList.add('hidden');
  });
  document.getElementById('ach-share').addEventListener('click', () => {
    saveImage();
    document.getElementById('achievement').classList.add('hidden');
  });

  // Debug
  window.__debug = { state, litCanvas, litCtx, tempCanvas, particles, sampleLitFraction };

  resize();
  buildColorSwatches();
  requestAnimationFrame(loop);
})();
</script>
</body>
