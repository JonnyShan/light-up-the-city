<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#040016" />
<title>Light Up The City</title>
<style>
  :root {
    --neon-pink: #ff2bd6;
    --neon-cyan: #00f0ff;
    --neon-purple: #b14cff;
    --neon-yellow: #ffd23f;
    --neon-green: #39ff88;
    --neon-orange: #ff8c2b;
    --bg-deep: #040016;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    font-family: 'Courier New', monospace;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  body {
    background:
      radial-gradient(ellipse at 20% 0%, rgba(177, 76, 255, 0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(255, 43, 214, 0.15) 0%, transparent 55%),
      var(--bg-deep);
  }

  #app {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .game-frame {
    position: relative;
    width: min(420px, 100vw);
    height: min(910px, 100vh);
    background: var(--bg-deep);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(255, 43, 214, 0.3);
    box-shadow: 0 0 40px rgba(255, 43, 214, 0.4), 0 0 80px rgba(177, 76, 255, 0.2);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    padding: 14px 14px 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
  }

  .lights-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border: 1px solid var(--neon-green);
    border-radius: 6px;
    color: var(--neon-green);
    font-size: 10px;
    letter-spacing: 2px;
    font-weight: bold;
    background: rgba(0,0,0,0.4);
    box-shadow: 0 0 8px rgba(57, 255, 136, 0.4);
    text-shadow: 0 0 6px var(--neon-green);
    text-transform: uppercase;
  }
  .lights-badge .dot {
    width: 6px; height: 6px;
    background: var(--neon-green);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--neon-green);
    animation: blink 1.6s infinite;
  }
  @keyframes blink {
    0%, 70%, 100% { opacity: 1; }
    80%, 90% { opacity: 0.3; }
  }

  .icon-btn {
    width: 36px;
    height: 36px;
    margin-left: 6px;
    background: rgba(26, 5, 51, 0.7);
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: inherit;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(0,240,255,0.4), inset 0 0 6px rgba(0,240,255,0.1);
    text-shadow: 0 0 4px var(--neon-cyan);
    transition: transform 0.1s;
    line-height: 1;
    pointer-events: auto;
  }
  .icon-btn:active { transform: scale(0.9); background: rgba(0, 240, 255, 0.25); }

  .lit-counter {
    align-self: center;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 2px;
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan), 0 0 16px rgba(0,240,255,0.5);
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(0,240,255,0.3);
    border-radius: 6px;
    padding: 4px 10px;
    pointer-events: none;
    transition: color 0.3s, text-shadow 0.3s;
  }
  .lit-counter.high { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink), 0 0 18px rgba(255,43,214,0.6); border-color: rgba(255,43,214,0.4); }

  /* Intro camera tilt-down animation */
  @keyframes camera-tilt-down {
    0%   { transform: translateY(-10%) scale(1.10); opacity: 0.25; filter: blur(3px); }
    60%  { opacity: 1; filter: blur(0.5px); }
    100% { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
  }
  .intro-anim canvas { animation: camera-tilt-down 1.4s cubic-bezier(0.2, 0.8, 0.3, 1.0) both; }
  .intro-anim .hud, .intro-anim .controls, .intro-anim .hint-text {
    animation: fade-in 0.6s ease-out 0.8s both;
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

  /* Achievement modal */
  #achievement {
    background: radial-gradient(ellipse at center, rgba(177,76,255,0.4) 0%, rgba(4,0,22,0.92) 70%);
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    pointer-events: auto;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    animation: fade-in 0.6s ease-out;
  }
  #achievement.hidden { display: none; }
  .ach-card {
    background: linear-gradient(145deg, rgba(26,5,51,0.9), rgba(8,2,30,0.95));
    border: 2px solid var(--neon-pink);
    border-radius: 14px;
    padding: 28px 24px;
    text-align: center;
    box-shadow: 0 0 30px rgba(255,43,214,0.6), inset 0 0 18px rgba(177,76,255,0.25);
    max-width: 320px;
    animation: card-in 0.6s cubic-bezier(0.2,0.8,0.3,1.2);
  }
  @keyframes card-in {
    from { transform: scale(0.7) translateY(40px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }
  .ach-eyebrow {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px var(--neon-yellow);
    margin-bottom: 14px;
    animation: blink 1.4s infinite;
  }
  .ach-title {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 3px;
    line-height: 1;
    text-transform: uppercase;
    background: linear-gradient(180deg, var(--neon-pink), var(--neon-cyan));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px rgba(255,43,214,0.5));
    margin-bottom: 8px;
  }
  .ach-title .accent {
    background: linear-gradient(180deg, var(--neon-yellow), var(--neon-orange));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px rgba(255,210,63,0.6));
  }
  .ach-sub {
    font-size: 9px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    margin: 6px 0 12px;
  }
  .ach-stat {
    font-size: 11px;
    color: var(--neon-cyan);
    text-shadow: 0 0 6px var(--neon-cyan);
    letter-spacing: 1.5px;
    margin-bottom: 18px;
  }
  .ach-actions { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .ach-cta {
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
    border: none;
    color: #fff;
    font-family: inherit;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 12px 18px;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 0 14px rgba(255,43,214,0.6);
    text-shadow: 0 0 6px rgba(0,0,0,0.5);
  }
  .ach-cta:active { transform: scale(0.96); }
  .ach-secondary {
    background: transparent;
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    text-shadow: 0 0 4px var(--neon-cyan);
  }
  .ach-uber {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--neon-yellow);
    text-shadow: 0 0 6px var(--neon-yellow);
    margin-top: 6px;
    text-transform: uppercase;
  }

  .controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    padding: 6px 14px 6px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    pointer-events: none;
    background: linear-gradient(0deg, rgba(4,0,22,0.95) 30%, transparent 100%);
  }

  .colors {
    display: flex;
    justify-content: center;
    gap: 6px;
    pointer-events: auto;
  }

  .color-swatch {
    width: 19px;
    height: 19px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer;
    position: relative;
    transition: transform 0.1s;
  }
  .color-swatch.active { transform: scale(1.18); border-color: #fff; box-shadow: 0 0 0 1px rgba(255,255,255,0.5); }
  .color-swatch.rainbow::after { box-shadow: 0 0 9px #ff2bd6, 0 0 12px #00f0ff, 0 0 6px #ffd23f; opacity: 0.6; }
  @keyframes rainbow-spin { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }
  .color-swatch::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    box-shadow: 0 0 14px currentColor;
    opacity: 0.8;
    pointer-events: none;
  }

  .brush-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: auto;
    color: var(--neon-cyan);
    font-size: 9px;
    letter-spacing: 1px;
    font-weight: bold;
    text-shadow: 0 0 4px var(--neon-cyan);
  }
  .brush-row input[type=range] {
    flex: 1;
    max-width: 200px;
    accent-color: var(--neon-pink);
    height: 4px;
  }
  .brush-val { min-width: 18px; text-align: right; color: var(--neon-pink); text-shadow: 0 0 4px var(--neon-pink); }

  #tooltip {
    position: absolute;
    z-index: 30;
    pointer-events: none;
    background: rgba(4,0,22,0.92);
    border: 1px solid var(--neon-cyan);
    color: #fff;
    text-shadow: 0 0 6px var(--neon-cyan);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 10px;
    letter-spacing: 2px;
    font-weight: bold;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #tooltip.show { opacity: 1; }

  .modes {
    display: flex;
    justify-content: center;
    gap: 6px;
    pointer-events: auto;
  }

  .mode-btn {
    flex: 1;
    max-width: 90px;
    padding: 8px 4px;
    background: rgba(26, 5, 51, 0.7);
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 1px;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(0,240,255,0.4), inset 0 0 6px rgba(0,240,255,0.1);
    text-shadow: 0 0 4px var(--neon-cyan);
    transition: all 0.1s;
  }
  .mode-btn.active {
    background: rgba(0, 240, 255, 0.25);
    box-shadow: 0 0 16px var(--neon-cyan), inset 0 0 12px rgba(0,240,255,0.4);
    color: #fff;
    text-shadow: 0 0 6px #fff, 0 0 12px var(--neon-cyan);
  }
  .mode-btn:active { transform: scale(0.95); }

  .overlay {
    position: absolute;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
  }
  .overlay.hidden { display: none; }

  #title-screen {
    background:
      radial-gradient(ellipse at 50% 30%, rgba(255, 43, 214, 0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 80%, rgba(0, 240, 255, 0.18) 0%, transparent 60%),
      linear-gradient(180deg, #040016 0%, #0a0533 50%, #1a0a4a 100%);
    cursor: pointer;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }
  #title-screen:active { filter: brightness(1.15); }
  #title-screen.hidden { display: none; }

  .intro-eyebrow {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--neon-cyan);
    text-shadow: 0 0 8px var(--neon-cyan);
    text-transform: uppercase;
    margin-bottom: 18px;
    opacity: 0.85;
  }
  .intro-title {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 4px;
    line-height: 0.95;
    text-transform: uppercase;
    background: linear-gradient(180deg, var(--neon-pink) 0%, var(--neon-purple) 50%, var(--neon-cyan) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 14px rgba(255, 43, 214, 0.6)) drop-shadow(0 0 22px rgba(177, 76, 255, 0.4));
    margin-bottom: 8px;
  }
  .intro-title .accent {
    background: linear-gradient(180deg, var(--neon-yellow), var(--neon-orange));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 14px rgba(255, 210, 63, 0.7));
  }
  .intro-sub {
    font-size: 11px;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    margin-top: 10px;
    margin-bottom: 32px;
  }
  .intro-cta {
    font-size: 14px;
    letter-spacing: 6px;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px var(--neon-yellow), 0 0 20px var(--neon-yellow);
    text-transform: uppercase;
    font-weight: bold;
    border: 2px solid var(--neon-yellow);
    padding: 14px 32px;
    box-shadow: 0 0 18px rgba(255, 210, 63, 0.5), inset 0 0 14px rgba(255, 210, 63, 0.15);
    animation: pulse 1.6s ease-in-out infinite;
    margin-top: 20px;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 18px rgba(255, 210, 63, 0.5), inset 0 0 14px rgba(255, 210, 63, 0.15); }
    50% { box-shadow: 0 0 32px rgba(255, 210, 63, 0.8), inset 0 0 20px rgba(255, 210, 63, 0.3); }
  }
  .intro-skyline {
    font-size: 9px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 28px;
  }
  .intro-skyline span { color: var(--neon-pink); text-shadow: 0 0 6px var(--neon-pink); }

  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    pointer-events: none;
  }
  .loading.hidden { display: none; }

  .hint-text {
    position: absolute;
    top: 70px; left: 0; right: 0;
    text-align: center;
    z-index: 9;
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    pointer-events: none;
    text-shadow: 0 0 6px rgba(0,240,255,0.6);
    transition: opacity 0.5s;
  }
  .hint-text.fade { opacity: 0; }

  @media (max-width: 480px) {
    .game-frame { border: none; box-shadow: none; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="game-frame">
    <div class="hud">
      <div><div class="lights-badge off" id="lights-badge"><span class="dot"></span><span id="lights-text">Lights Off</span></div></div>
      <div class="lit-counter" id="lit-counter">0%</div>
      <div style="text-align: right;">
        <button class="icon-btn" id="reset-btn" title="Reset">↻</button>
        <button class="icon-btn" id="save-btn" title="Save">⤓</button>
      </div>
    </div>

    <div class="hint-text" id="hint-text">Drag to light up Sydney</div>

    <canvas id="game"></canvas>

    <div class="loading" id="loading">Loading skyline…</div>

    <div class="controls">
      <div class="colors" id="colors"></div>
      <div class="brush-row">
        <span class="brush-label">BRUSH</span>
        <input type="range" id="brush-slider" min="1" max="30" value="12" />
        <span class="brush-val" id="brush-val">12</span>
      </div>
    </div>

    <!-- Custom hex picker popover -->
    <input type="color" id="hex-picker" style="position:absolute;visibility:hidden;width:0;height:0;" value="#ff2bd6" />

    <!-- Building tooltips (positioned overlay) -->
    <div id="tooltip"></div>

    <div class="overlay" id="title-screen">
      <div class="intro-eyebrow">A Vivid Sandbox</div>
      <div class="intro-title">Light Up<br/><span class="accent">The City</span></div>
      <div class="intro-sub">Sydney · After Dark</div>
      <div class="intro-cta">Tap To Begin</div>
      <div class="intro-skyline">Drag · Light Windows · <span>Make Art</span></div>
    </div>

    <div class="overlay hidden" id="achievement">
      <div class="ach-card">
        <div class="ach-eyebrow">★ VIVID UNLOCKED ★</div>
        <div class="ach-title">YOU LIT UP<br/><span class="accent">SYDNEY</span></div>
        <div class="ach-sub">Backseat Arcade · Vivid Edition</div>
        <div class="ach-stat" id="ach-stat">100% lit · A masterpiece</div>
        <div class="ach-actions">
          <button class="ach-cta" id="ach-share">Save & Share</button>
          <button class="ach-secondary" id="ach-close">Keep Painting</button>
        </div>
        <div class="ach-uber">↗ Tap city to claim Uber Vivid ride credit</div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const titleScreen = document.getElementById('title-screen');
  const loadingEl = document.getElementById('loading');
  const colorsEl = document.getElementById('colors');
  const lightsTextEl = document.getElementById('lights-text');
  const hintEl = document.getElementById('hint-text');
  const resetBtn = document.getElementById('reset-btn');
  const saveBtn = document.getElementById('save-btn');

  const COLORS = [
    { hex: '#ff2bd6' }, { hex: '#00f0ff' }, { hex: '#b14cff' },
    { hex: '#ffd23f' }, { hex: '#39ff88' }, { hex: '#ff8c2b' },
    { hex: 'rainbow' },  // special: reveals on-image's natural multi-colors
    { hex: 'custom' },   // opens native hex picker
  ];

  let W = 0, H = 0, DPR = 1;
  let imgFit = { x: 0, y: 0, w: 0, h: 0 };

  const litCanvas = document.createElement('canvas');
  const litCtx = litCanvas.getContext('2d');
  const maskCanvas = document.createElement('canvas');
  const maskCtx = maskCanvas.getContext('2d');
  const tempCanvas = document.createElement('canvas');
  const tempCtx = tempCanvas.getContext('2d');
  const bloomCanvas = document.createElement('canvas');
  const bloomCtx = bloomCanvas.getContext('2d');
  const bloomCanvas2 = document.createElement('canvas');
  const bloomCtx2 = bloomCanvas2.getContext('2d');
  // Flicker layer — short-lived bright bursts on fresh paint (#1)
  const flickerCanvas = document.createElement('canvas');
  const flickerCtx = flickerCanvas.getContext('2d');
  const flickers = []; // {x, y, t, dur, color}

  const offImg = new Image();
  const onImg = new Image();
  let imagesLoaded = 0;
  let maskBuilt = false;

  const state = {
    running: false,
    selectedColor: COLORS[0].hex,
    selectedHueOffset: 0,
    selectedMode: 'solid',
    pointers: new Map(),
    time: 0, last: 0,
    tiltX: 0, tiltY: 0,
    tiltTargetX: 0, tiltTargetY: 0,
    litFraction: 0,
    litLastSampled: 0,
    achievementShown: false,
    brushRadius: 12,       // #5 — adjustable via slider
    fireworks: [],         // #3 — milestone bursts
    milestonesHit: new Set(), // tracks which thresholds fired
    lastHeli: 0,           // #13 — helicopter timer
    helicopters: [],
  };

  // ============= AUDIO =============
  const audio = { ctx: null, master: null, initialized: false };
  function initAudio() {
    if (audio.initialized) return;
    try {
      audio.ctx = new (window.AudioContext || window.webkitAudioContext)();
      audio.master = audio.ctx.createGain();
      audio.master.gain.value = 0.32;
      audio.master.connect(audio.ctx.destination);
      audio.initialized = true;
    } catch (e) {}
  }
  function playBlip(freq, dur = 0.18, type = 'square', vol = 0.12) {
    if (!audio.initialized) return;
    const t = audio.ctx.currentTime;
    const osc = audio.ctx.createOscillator();
    const g = audio.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.7, t + dur);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(g); g.connect(audio.master);
    osc.start(t); osc.stop(t + dur + 0.05);
  }
  function colorToFreq(hex) {
    const idx = COLORS.findIndex(c => c.hex === hex);
    const scale = [261.63, 293.66, 329.63, 392, 440, 493.88];
    return scale[idx % scale.length] * 2;
  }

  // ============= RESIZE =============
  function resize() {
    const rect = canvas.getBoundingClientRect();
    DPR = Math.min(window.devicePixelRatio || 1, 3); // bumped 2 → 3 for retina sharpness
    W = rect.width; H = rect.height;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.imageSmoothingEnabled = false; // crisp pixel art

    litCanvas.width = W * DPR;
    litCanvas.height = H * DPR;
    litCtx.setTransform(DPR, 0, 0, DPR, 0, 0);

    tempCanvas.width = W * DPR;
    tempCanvas.height = H * DPR;
    tempCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
    tempCtx.imageSmoothingEnabled = false;

    bloomCanvas.width = Math.floor(W * 0.6);
    bloomCanvas.height = Math.floor(H * 0.6);
    bloomCanvas2.width = Math.floor(W * 0.6);
    bloomCanvas2.height = Math.floor(H * 0.6);

    flickerCanvas.height = H;

    if (offImg.complete && offImg.naturalWidth) imgFit = computeFit(offImg, W, H);

  function computeFit(img, w, h) {
    const r = img.naturalWidth / img.naturalHeight;
    const cr = w / h;
    let fw, fh, fx, fy;
    if (r > cr) { fh = h; fw = h * r; fx = (w - fw) / 2; fy = 0; }
    else { fw = w; fh = w / r; fx = 0; fy = (h - fh) / 2; }
    return { x: fx, y: fy, w: fw, h: fh };
  }

  // ============= IMAGE LOAD + WINDOW MASK =============
  function onImageReady() {
    imagesLoaded++;

    }
  }
  offImg.onload = onImageReady;
  onImg.onload = onImageReady;
  offImg.onerror = () => loadingEl.textContent = 'skyline-off.png missing';
  onImg.onerror = () => loadingEl.textContent = 'skyline-on.png missing';
  offImg.src = 'skyline-off.png';
  onImg.src = 'skyline-on.png';

  // #11 — Mask compute in Web Worker (off main thread, no input freeze)
  // #12 — Cached to localStorage as PNG data URL keyed by image size signature
  const MASK_WORKER_SRC = `
    self.onmessage = (e) => {
      const { w, h, onBuf, offBuf } = e.data;
      // Wrap transferred ArrayBuffers back as typed arrays — indexing buf[i] returns undefined!
      const onData = new Uint8ClampedArray(onBuf);
      const offData = new Uint8ClampedArray(offBuf);
      const out = new Uint8ClampedArray(w * h * 4);
      const hits = new Uint8Array(w * h);
      const oceanStartY = Math.floor(h * 0.78);
      const lumOn = new Float32Array(w * h);
      const lumOff = new Float32Array(w * h);
      for (let i = 0, p = 0; i < w * h; i++, p += 4) {
        lumOn[i] = onData[p] * 0.299 + onData[p+1] * 0.587 + onData[p+2] * 0.114;
        lumOff[i] = offData[p] * 0.299 + offData[p+1] * 0.587 + offData[p+2] * 0.114;
      }
      const D = 4;
      for (let y = D; y < oceanStartY - D; y++) {
        for (let x = D; x < w - D; x++) {
          const idx = y * w + x;
          const lum = lumOn[idx];
          const diff = lum - lumOff[idx];
          if (diff < 40) continue;
          if (lum > 200 && y > h * 0.45) { hits[idx] = 1; continue; }
          if (lum < 70) continue;
          const mortar = (lumOn[idx - D] + lumOn[idx + D] + lumOn[idx - D * w] + lumOn[idx + D * w]) * 0.25;
          if (lum - mortar > 30) hits[idx] = 1;
        }
      }
      // Dilate 1px in all 8 directions so each window becomes 3x3 — visible on downscale
      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          const i = y * w + x;
          if (hits[i] ||
              hits[i - 1] || hits[i + 1] ||
              hits[i - w] || hits[i + w] ||
              hits[i - w - 1] || hits[i - w + 1] ||
              hits[i + w - 1] || hits[i + w + 1]) {
            const p = i * 4;
            out[p] = 255; out[p+1] = 255; out[p+2] = 255; out[p+3] = 255;
          }
        }
      }
      self.postMessage({ out }, [out.buffer]);
    };
  `;
  function cacheKey() {
    return `lutc-mask:${onImg.naturalWidth}x${onImg.naturalHeight}:v4`;
  }
  function buildWindowMask(cb) {
    const w = onImg.naturalWidth;
    const h = onImg.naturalHeight;
    maskCanvas.width = w;
    maskCanvas.height = h;

    // #12 — Cache check
    const cached = localStorage.getItem(cacheKey());
    if (cached) {
      const img = new Image();
      img.onload = () => {
        maskCtx.drawImage(img, 0, 0);
        maskBuilt = true;
        if (cb) cb();
      };
      img.src = cached;
      return;
    }

    const tmpOn = document.createElement('canvas');
    tmpOn.width = w; tmpOn.height = h;
    const tmpOff = document.createElement('canvas');
    tmpOff.width = w; tmpOff.height = h;
    tmpOn.getContext('2d').drawImage(onImg, 0, 0);
    tmpOff.getContext('2d').drawImage(offImg, 0, 0);
    const onData = tmpOn.getContext('2d').getImageData(0, 0, w, h).data;
    const offData = tmpOff.getContext('2d').getImageData(0, 0, w, h).data;

    // #11 — Run in worker so 1376x768 compute (~1M pixels) doesn't block UI
    const blob = new Blob([MASK_WORKER_SRC], { type: 'application/javascript' });
    const worker = new Worker(URL.createObjectURL(blob));
    worker.onmessage = (ev) => {
      const out = ev.data.out;
      const imgData = new ImageData(out, w, h);
      maskCtx.putImageData(imgData, 0, 0);
      maskBuilt = true;
      // Cache as compressed PNG dataURL
      try {
        localStorage.setItem(cacheKey(), maskCanvas.toDataURL('image/png'));
      } catch (e) { /* quota exceeded - non-fatal */ }
      worker.terminate();
      if (cb) cb();
    };
    worker.postMessage({ w, h, onBuf: onData.buffer, offBuf: offData.buffer }, [onData.buffer, offData.buffer]);
  }

  // ============= COLOR + MODE UI =============
  function buildColorSwatches() {
    colorsEl.innerHTML = '';
    COLORS.forEach((c, i) => {
      const el = document.createElement('div');
      el.className = 'color-swatch' + (i === 0 ? ' active' : '') + (c.hex === 'rainbow' ? ' rainbow' : '');
      if (c.hex === 'rainbow') {

        el.style.background = c.hex;
        el.style.color = c.hex;

  }
  function selectColor(hex, el) {
    state.selectedColor = hex;
    const c = COLORS.find(c => c.hex === hex);
    state.selectedHueOffset = c ? c.hue - 320 : 0;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('active', s === el));
    playBlip(colorToFreq(hex) * 1.2, 0.06, 'sine', 0.06);
  }
  // #10 — Custom hex picker integration
  const hexPicker = document.getElementById('hex-picker');
  hexPicker.addEventListener('input', e => {
    const hex = e.target.value;
    const customSwatch = document.querySelector('.color-swatch[data-hex="custom"]');

  // #5 — Brush size slider
  const brushSlider = document.getElementById('brush-slider');
  const brushVal = document.getElementById('brush-val');
  brushSlider.addEventListener('input', e => {
    state.brushRadius = parseInt(e.target.value);
    brushVal.textContent = state.brushRadius;
  });
  function selectMode(mode, el) {

  }
  document.querySelectorAll('.mode-btn').forEach(btn => {

  // ============= PAINT — PIXEL-PRECISE =============
  // Light-up burst particles — sparkle pixels at finger drag
  const particles = [];
  function spawnParticles(x, y, hex) {
    const n = 3 + (Math.random() * 3) | 0;
    for (let i = 0; i < n; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 80,
        vy: (Math.random() - 0.5) * 80 - 30,
        life: 1.0,
        color: hex,
      });
    }
  }
  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 90 * dt;
      p.life -= dt * 2.4;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }
  function drawParticles() {
    if (!particles.length) return;
    ctx.save();
    for (const p of particles) {
      const a = Math.max(0, p.life);
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      const s = a > 0.5 ? 3 : 2;
      ctx.fillRect((p.x - s/2) | 0, (p.y - s/2) | 0, s, s);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  const WATER_LINE = 0.82;  // y fraction below which water starts (no paint, only reflects)
  function paintAt(x, y) {
    if (!state.running || !maskBuilt) return;
    if (y >= H * WATER_LINE) return;  // block painting on water
    const radius = state.brushRadius;  // #5 — slider-controlled
    const hex = state.selectedColor === 'rainbow' ? '#ffffff' : state.selectedColor;
    // Color halo — soft falloff
    const grad = litCtx.createRadialGradient(x, y, 0, x, y, radius);
    grad.addColorStop(0, hex);
    grad.addColorStop(0.5, hex);
    grad.addColorStop(1, hex + '00');
    litCtx.globalCompositeOperation = 'source-over';
    litCtx.fillStyle = grad;
    litCtx.beginPath();
    litCtx.arc(x, y, radius, 0, Math.PI * 2);
    litCtx.fill();
    // Hot white core — adds a 1-2px peak-bright pixel cluster at brush center.
    // This makes single windows pop brighter than the color halo alone.
    litCtx.globalCompositeOperation = 'lighter';
    const coreR = Math.max(1, Math.min(radius * 0.35, 4));
    const coreGrad = litCtx.createRadialGradient(x, y, 0, x, y, coreR);
    coreGrad.addColorStop(0, '#ffffff');
    coreGrad.addColorStop(0.5, hex);
    coreGrad.addColorStop(1, hex + '00');
    litCtx.fillStyle = coreGrad;
    litCtx.beginPath();
    litCtx.arc(x, y, coreR, 0, Math.PI * 2);
    litCtx.fill();
    litCtx.globalCompositeOperation = 'source-over';

    if (Math.random() < 0.35) {
      const partColor = state.selectedColor === 'rainbow'
        ? COLORS[(Math.random() * 6) | 0].hex
        : hex;
      spawnParticles(x, y, partColor);
    }
    if (Math.random() < 0.1) {
      playBlip(colorToFreq(hex) * (0.9 + Math.random() * 0.4), 0.06, 'square', 0.04);
    }
    // #1 — window flicker burst (capped to avoid memory bloat)
    if (flickers.length < 200 && Math.random() < 0.55) {
      flickers.push({ x, y, t: state.time, dur: 0.22 + Math.random() * 0.15, color: hex });
    }
    // Throttled live sample so lit-counter updates immediately
    state.paintTicks = (state.paintTicks || 0) + 1;
    if (state.paintTicks % 20 === 0) {
      sampleLitFraction();
    }
  }
  function paintLine(x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const dist = Math.sqrt(dx * dx + dy * dy);
    // #9 — sub-pixel smoothing: step every 1 pixel
    const steps = Math.max(1, Math.ceil(dist));
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      paintAt(x1 + dx * t, y1 + dy * t);
    }
  }

  // ============= RESET + SAVE =============
  function resetSkyline() {
    litCtx.clearRect(0, 0, W, H);
    flickers.length = 0;
    particles.length = 0;
    state.litFraction = 0;
    state.achievementShown = false;
    document.getElementById('lit-counter').textContent = '0%';
    document.getElementById('lit-counter').classList.remove('high');
    document.getElementById('achievement').classList.add('hidden');
    document.getElementById('lights-badge').classList.add('off');
    document.getElementById('lights-text').textContent = 'Lights Off';
    playBlip(220, 0.4, 'sawtooth', 0.1);
  }
  function saveImage() {
    const link = document.createElement('a');
    link.download = 'light-up-the-city-' + Date.now() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    playBlip(880, 0.18, 'sine', 0.12);
  }
  resetBtn.addEventListener('click', e => { e.stopPropagation(); resetSkyline(); });
  saveBtn.addEventListener('click', e => { e.stopPropagation(); saveImage(); });
  resetBtn.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); resetSkyline(); }, { passive: false });
  saveBtn.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); saveImage(); }, { passive: false });

  // ============= POINTER =============
  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  canvas.addEventListener('pointerdown', e => {
    e.preventDefault();
    try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
    const p = getPos(e);
    state.pointers.set(e.pointerId, { x: p.x, y: p.y });
    paintAt(p.x, p.y);
  });
  canvas.addEventListener('pointermove', e => {
    if (!state.pointers.has(e.pointerId)) return;
    const p = getPos(e);
    const last = state.pointers.get(e.pointerId);
    paintLine(last.x, last.y, p.x, p.y);
    state.pointers.set(e.pointerId, { x: p.x, y: p.y });
  });
  function endPointer(e) { state.pointers.delete(e.pointerId); }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  canvas.addEventListener('pointerleave', endPointer);

  // Tilt disabled — screen stays stable
  function enableTilt() {}

  // ============= START =============
  function start() {
    initAudio();
    enableTilt();
    resize();
    state.running = true;
    titleScreen.classList.add('hidden');
    hintEl.classList.remove('fade');
    setTimeout(() => hintEl.classList.add('fade'), 4000);
  }
  titleScreen.addEventListener('click', start);
  titleScreen.addEventListener('touchstart', e => { e.preventDefault(); start(); }, { passive: false });
  window.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !state.running) start();
    const n = parseInt(e.key);
    if (n >= 1 && n <= COLORS.length) {
      const sw = document.querySelectorAll('.color-swatch');
      selectColor(COLORS[n - 1].hex, sw[n - 1]);
    }
  });
  window.addEventListener('resize', resize);

  // ============= RENDER =============
  function modeFilter() {
    if (state.selectedMode === 'cycle') return `hue-rotate(${state.time * 30}deg) saturate(1.2)`;
    if (state.selectedMode === 'disco') return `hue-rotate(${state.time * 240}deg) saturate(1.5)`;
    return '';
  }
  function render() {
    // Auto effects disabled — static camera, no tilt drift
    const px = 0;
    const py = 0;

    ctx.clearRect(0, 0, W, H);

    if (!maskBuilt) {
      ctx.fillStyle = '#040016';
      ctx.fillRect(0, 0, W, H);
      return;
    }

    // Base = DARK Sydney
    ctx.drawImage(offImg, imgFit.x + px, imgFit.y + py, imgFit.w, imgFit.h);
    // Ambient: hint of vivid baked into base (player sees glimmer of color even unpainted)
    ctx.save();
    ctx.globalAlpha = 0.28;
    ctx.drawImage(onImg, imgFit.x + px, imgFit.y + py, imgFit.w, imgFit.h);
    ctx.globalAlpha = 1;
    ctx.restore();

    // #8 — Cloud drift overlay
    drawCloudDrift();
    // #13 — Helicopter
    drawHelicopters();

    // Build painted layer.
    // Rainbow swatch: reveal full multi-color on-image.
    // Single color swatch: ONLY that color appears at lit-window positions.
    tempCtx.clearRect(0, 0, W, H);
    if (state.selectedColor === 'rainbow') {
      tempCtx.drawImage(onImg, imgFit.x + px, imgFit.y + py, imgFit.w, imgFit.h);
      tempCtx.globalCompositeOperation = 'destination-in';
      tempCtx.drawImage(litCanvas, 0, 0, W, H);
    } else {
      // user color clipped to (paint shape ∩ window mask)
      tempCtx.drawImage(litCanvas, 0, 0, W, H);
      tempCtx.globalCompositeOperation = 'destination-in';
      tempCtx.drawImage(maskCanvas, imgFit.x + px, imgFit.y + py, imgFit.w, imgFit.h);
    }
    tempCtx.globalCompositeOperation = 'source-over';

    // #2 — wall bleed: tight 3px halo of painted color leaks onto adjacent dark wall
    ctx.save();
    ctx.filter = 'blur(3px) saturate(1.4) brightness(1.1)';
    ctx.globalAlpha = 0.3;
    ctx.drawImage(tempCanvas, 0, 0, W, H);
    ctx.filter = 'none';
    ctx.globalAlpha = 1;
    ctx.restore();

    // #4 + #8 — crisp window edges with additive overlap blend, super-bright
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.globalCompositeOperation = 'lighter';
    ctx.filter = 'saturate(2.0) brightness(1.7) contrast(1.15)';
    ctx.drawImage(tempCanvas, 0, 0, W, H);
    ctx.filter = 'none';
    ctx.globalCompositeOperation = 'source-over';
    ctx.imageSmoothingEnabled = true;
    ctx.restore();

    // #1 — flicker bursts on freshly-painted windows
    drawFlickers();

    // Water reflection — flip the painted layer vertically into water area, fade + horizontal jitter
    drawWaterReflection();
    // #3 — vertical LED columns streaking into water
    drawLightColumns();
    // #14 — Ferry shimmer
    drawFerryShimmer();

    applyBloom();
    // #7 — Subtle window twinkle (after bloom so it shines through)
    drawWindowTwinkle();
    drawParticles();
    // #3 — Fireworks (above everything except vignette)
    drawFireworks();
    applyVignette();

    // Periodically sample lit fraction (every ~0.5s)
    if (state.time - (state.litLastSampled || 0) > 0.5) {
      sampleLitFraction();
      state.litLastSampled = state.time;
    }
  }

  function sampleLitFraction() {
    // litCanvas backing store is W*DPR x H*DPR — sample full area not just transformed
    const lw = litCanvas.width, lh = litCanvas.height;
    const d = litCtx.getImageData(0, 0, lw, lh).data;
    let lit = 0;
    for (let i = 3; i < d.length; i += 4) if (d[i] > 50) lit++;
    const frac = Math.min(1, lit / (lw * lh * 0.42));  // 42% = approx paintable area
    state.litFraction = frac;
    const pct = Math.round(frac * 100);
    const el = document.getElementById('lit-counter');
    el.textContent = pct + '%';
    el.classList.toggle('high', pct >= 50);
    if (pct >= 5) {
      document.getElementById('lights-badge').classList.remove('off');
      document.getElementById('lights-text').textContent = 'Painting';
    }
    // #3 — fireworks at milestones (25%, 50%, 100%)
    const milestones = [25, 50, 100];
    for (const m of milestones) {
      if (pct >= m && !state.milestonesHit.has(m)) {
        state.milestonesHit.add(m);
        spawnFirework(m);
      }
    }
  }

  // #3 — Fireworks burst at milestones
  function spawnFirework(milestone) {
    const bursts = milestone === 100 ? 6 : milestone === 50 ? 3 : 2;
    for (let b = 0; b < bursts; b++) {
      setTimeout(() => {
        const fx = 60 + Math.random() * (W - 120);
        const fy = 80 + Math.random() * (H * 0.35);
        const palette = ['#ff2bd6', '#00f0ff', '#ffd23f', '#b14cff', '#39ff88'];
        const color = palette[(Math.random() * palette.length) | 0];
        const count = 28 + (Math.random() * 16) | 0;
        for (let i = 0; i < count; i++) {
          const ang = (i / count) * Math.PI * 2 + Math.random() * 0.3;
          const spd = 80 + Math.random() * 80;
          state.fireworks.push({
            x: fx, y: fy,
            vx: Math.cos(ang) * spd,
            vy: Math.sin(ang) * spd,
            color, life: 0, ttl: 1.0 + Math.random() * 0.6,
          });
        }
        playBlip(120 + b * 40, 0.5, 'triangle', 0.12);
      }, b * 280);
    }
  }
  function updateFireworks(dt) {
    for (let i = state.fireworks.length - 1; i >= 0; i--) {
      const f = state.fireworks[i];
      f.life += dt;
      if (f.life >= f.ttl) { state.fireworks.splice(i, 1); continue; }
      f.x += f.vx * dt;
      f.y += f.vy * dt;
      f.vy += 60 * dt;  // gravity
      f.vx *= 0.98; f.vy *= 0.98;
    }
  }
  function drawFireworks() {
    if (state.fireworks.length === 0) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const f of state.fireworks) {
      const a = Math.max(0, 1 - f.life / f.ttl);
      ctx.globalAlpha = a;
      ctx.fillStyle = f.color;
      ctx.beginPath();
      ctx.arc(f.x, f.y, 2, 0, Math.PI * 2);
      ctx.fill();
      // trail
      ctx.globalAlpha = a * 0.5;
      ctx.beginPath();
      ctx.arc(f.x - f.vx * 0.03, f.y - f.vy * 0.03, 1.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // #13 — Helicopter crosses sky every 20s
  function maybeSpawnHelicopter() {
    if (state.time - state.lastHeli >= 20) {
      state.lastHeli = state.time;
      state.helicopters.push({
        x: -20,
        y: 40 + Math.random() * (H * 0.25),
        speed: 30 + Math.random() * 20,
        blinkPhase: 0,
      });
    }
  }
  function updateHelicopters(dt) {
    for (let i = state.helicopters.length - 1; i >= 0; i--) {
      const h = state.helicopters[i];
      h.x += h.speed * dt;
      h.blinkPhase += dt * 5;
      if (h.x > W + 20) state.helicopters.splice(i, 1);
    }
  }
  function drawHelicopters() {
    for (const h of state.helicopters) {
      ctx.save();
      // body (tiny dark silhouette)
      ctx.fillStyle = 'rgba(20,20,30,0.7)';
      ctx.fillRect(h.x - 3, h.y, 6, 2);
      ctx.fillRect(h.x - 1, h.y - 2, 2, 2);
      // blinking red navigation light
      const blink = (Math.sin(h.blinkPhase) + 1) * 0.5;
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = blink;
      ctx.fillStyle = '#ff2233';
      ctx.beginPath();
      ctx.arc(h.x, h.y + 1, 2, 0, Math.PI * 2);
      ctx.fill();
      // subtle glow
      ctx.globalAlpha = blink * 0.4;
      ctx.beginPath();
      ctx.arc(h.x, h.y + 1, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // #14 — Ferry shimmer overlay: subtle horizontal bands on water that pulse
  function drawFerryShimmer() {
    const ferries = [
      { x: 0.10, y: 0.92, len: 0.10, color: '#ffd23f', phase: 0 },
      { x: 0.55, y: 0.88, len: 0.08, color: '#fff5d0', phase: 1.3 },
      { x: 0.30, y: 0.95, len: 0.07, color: '#ffd23f', phase: 2.7 },
      { x: 0.80, y: 0.86, len: 0.06, color: '#fff5d0', phase: 4.1 },
    ];
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const f of ferries) {
      const pulse = 0.6 + 0.4 * Math.sin(state.time * 1.5 + f.phase);
      ctx.globalAlpha = 0.6 * pulse;
      ctx.fillStyle = f.color;
      const fx = f.x * W;
      const fy = f.y * H;
      const fl = f.len * W;
      ctx.fillRect(fx, fy, fl, 1.5);
      // bright cabin window dots
      ctx.globalAlpha = pulse;
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc(fx + (i + 0.5) * fl / 4, fy - 1, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();
  }

  // #8 — Cloud parallax drift overlay (very subtle, doesn't break "no flashy auto")
  // Pre-cache a low-res cloud strip from off-image top portion
  let cloudStripCanvas = null;
  function buildCloudStrip() {
    if (cloudStripCanvas) return;
    const cw = offImg.naturalWidth;
    const ch = Math.floor(offImg.naturalHeight * 0.25);
    cloudStripCanvas = document.createElement('canvas');
    cloudStripCanvas.width = cw;
    cloudStripCanvas.height = ch;
    cloudStripCanvas.getContext('2d').drawImage(offImg, 0, 0, cw, ch, 0, 0, cw, ch);
  }
  function drawCloudDrift() {
    if (!cloudStripCanvas) buildCloudStrip();
    if (!cloudStripCanvas) return;
    const offset = (state.time * 4) % W;
    const cloudH = H * 0.25;
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.drawImage(cloudStripCanvas, -offset, 0, W, cloudH);
    ctx.drawImage(cloudStripCanvas, W - offset, 0, W, cloudH);
    ctx.restore();
  }

  // #7 — Window twinkle: subtle alpha jitter on painted layer (only after some paint exists)
  function drawWindowTwinkle() {
    if (!state.litFraction || state.litFraction < 0.02) return;
    const twinkle = 0.92 + 0.08 * Math.sin(state.time * 2.3);
    ctx.save();
    ctx.globalAlpha = (1 - twinkle) * 1.2;
    ctx.globalCompositeOperation = 'lighter';
    ctx.drawImage(tempCanvas, 0, 0, W, H);
    ctx.restore();
  }

  // Water reflection — vertically mirror painted lights into water area with wave jitter
  function drawWaterReflection() {
    const waterY = H * WATER_LINE;
    const waterH = H - waterY;
    if (waterH < 4) return;
    const reflectableH = Math.min(waterY * 0.55, waterH);

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const sliceCount = 24;
    const sliceH = reflectableH / sliceCount;
    for (let i = 0; i < sliceCount; i++) {
      const srcY = waterY - reflectableH + i * sliceH;
      const dstY = waterY + (sliceCount - 1 - i) * sliceH;
      if (dstY >= H) break;
      // brighter near water line, fades down
      const fade = Math.pow(1 - i / sliceCount, 1.4) * 1.0;
      const jitter = Math.sin(state.time * 1.8 + i * 0.5) * 3;
      ctx.globalAlpha = fade;
      ctx.drawImage(tempCanvas, 0, srcY, W, sliceH, jitter, dstY, W, Math.min(sliceH, H - dstY));
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
  }

  // #1 — drawFlickers: short white shimmer at fresh paint locations
  function drawFlickers() {
    if (flickers.length === 0) return;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const now = state.time;
    for (let i = flickers.length - 1; i >= 0; i--) {
      const f = flickers[i];
      const age = now - f.t;
      if (age >= f.dur) { flickers.splice(i, 1); continue; }
      const p = age / f.dur;
      const alpha = (1 - p) * (0.5 + 0.5 * Math.sin(age * 60));
      const rad = 3 + p * 4;
      const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, rad);
      grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
      grad.addColorStop(0.5, f.color);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(f.x, f.y, rad, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // #3 — vertical light columns: bright windows above water leak downward into harbour
  function drawLightColumns() {
    const waterY = Math.floor(H * WATER_LINE);
    if (waterY >= H - 4) return;
    // Sample 1px-tall strip just above waterline; find bright columns
    const strip = tempCtx.getImageData(0, Math.max(0, waterY - 3), W, 3).data;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let x = 0; x < W; x += 2) {
      // Avg the 3 rows for the column
      let r = 0, g = 0, b = 0, n = 0;
      for (let row = 0; row < 3; row++) {
        const i = (row * W + x) * 4;
        if (strip[i + 3] > 30) {
          r += strip[i]; g += strip[i + 1]; b += strip[i + 2]; n++;
        }
      }
      if (n === 0) continue;
      r /= n; g /= n; b /= n;
      const lum = r * 0.299 + g * 0.587 + b * 0.114;
      if (lum < 80) continue;
      // Draw vertical streak down into water, fading
      const streakH = Math.min(H - waterY, 60 + lum * 0.3);
      const grad = ctx.createLinearGradient(0, waterY, 0, waterY + streakH);
      grad.addColorStop(0, `rgba(${r|0},${g|0},${b|0},0.55)`);
      grad.addColorStop(0.5, `rgba(${r|0},${g|0},${b|0},0.18)`);
      grad.addColorStop(1, `rgba(${r|0},${g|0},${b|0},0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(x, waterY, 2, streakH);
    }
    ctx.restore();
  }

  function showAchievement(pct) {
    document.getElementById('ach-stat').textContent = pct + '% lit · A masterpiece';
    document.getElementById('achievement').classList.remove('hidden');
    // sparkle audio
    playBlip(880, 0.4, 'sine', 0.15);
    setTimeout(() => playBlip(1320, 0.4, 'sine', 0.13), 120);
    setTimeout(() => playBlip(1760, 0.5, 'sine', 0.12), 240);
  }

  // Procedural star twinkle — seeded once, refreshed alpha per frame
  const STARS = (() => {
    const arr = [];
    for (let i = 0; i < 60; i++) {
      arr.push({
        x: Math.random(),
        y: Math.random() * 0.32,           // upper 32% only
        size: Math.random() < 0.85 ? 1 : 2,
        phase: Math.random() * Math.PI * 2,
        speed: 0.6 + Math.random() * 1.6,
      });
    }
    return arr;
  })();
  function drawStars() {
    ctx.save();
    for (const s of STARS) {
      const a = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(state.time * s.speed + s.phase));
      ctx.globalAlpha = a;
      ctx.fillStyle = '#fff';
      const x = s.x * W, y = s.y * H;
      ctx.fillRect(x, y, s.size, s.size);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Aurora ribbon — animated cyan/purple gradient sweep top 30%
  function drawAurora() {
    const ribbonH = H * 0.30;
    const offset = (Math.sin(state.time * 0.15) + 1) * 0.5;
    const grad = ctx.createLinearGradient(0, 0, W, 0);
    grad.addColorStop(0, 'rgba(0,240,255,0)');
    grad.addColorStop(Math.max(0, offset - 0.25), 'rgba(0,240,255,0.05)');
    grad.addColorStop(offset, 'rgba(177,76,255,0.10)');
    grad.addColorStop(Math.min(1, offset + 0.25), 'rgba(255,43,214,0.05)');
    grad.addColorStop(1, 'rgba(255,43,214,0)');
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, ribbonH);
    ctx.restore();
  }

  function applyBloom() {
    const bw = bloomCanvas.width;
    const bh = bloomCanvas.height;
    // Source = brightened painted layer
    bloomCtx.clearRect(0, 0, bw, bh);
    bloomCtx.filter = 'brightness(1.7) saturate(1.6)';
    bloomCtx.drawImage(tempCanvas, 0, 0, bw, bh);
    bloomCtx.filter = 'none';
    // Tight halo — keep tight, hugs windows
    bloomCtx2.clearRect(0, 0, bw, bh);
    bloomCtx2.filter = 'blur(3px)';
    bloomCtx2.drawImage(bloomCanvas, 0, 0);
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 1.0;
    ctx.drawImage(bloomCanvas2, 0, 0, W, H);
    // Medium halo — visible glow
    bloomCtx2.clearRect(0, 0, bw, bh);
    bloomCtx2.filter = 'blur(8px)';
    bloomCtx2.drawImage(bloomCanvas, 0, 0);
    bloomCtx2.filter = 'none';
    ctx.globalAlpha = 0.65;
    ctx.drawImage(bloomCanvas2, 0, 0, W, H);
    // Wide halo (atmospheric) — #6: scales with density
    const dens = state.litFraction || 0;
    const wideBlur = 18 + dens * 18;
    const wideAlpha = 0.32 + dens * 0.30;
    bloomCtx2.clearRect(0, 0, bw, bh);
    bloomCtx2.filter = `blur(${wideBlur}px)`;
    bloomCtx2.drawImage(bloomCanvas, 0, 0);
    bloomCtx2.filter = 'none';
    ctx.globalAlpha = wideAlpha;
    ctx.drawImage(bloomCanvas2, 0, 0, W, H);
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
  }
  function applyVignette() {
    const grad = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.4, W / 2, H / 2, Math.max(W, H) * 0.78);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(0.7, 'rgba(0,0,0,0.22)');
    grad.addColorStop(1, 'rgba(0,0,0,0.65)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  function loop(ts) {
    const dt = Math.min(0.05, (ts - state.last) / 1000 || 0);
    state.last = ts;
    state.time += dt;
    updateParticles(dt);
    updateFireworks(dt);
    maybeSpawnHelicopter();
    updateHelicopters(dt);
    render();
    requestAnimationFrame(loop);
  }

  // Achievement modal buttons
  document.getElementById('ach-close').addEventListener('click', () => {
    document.getElementById('achievement').classList.add('hidden');
  });
  document.getElementById('ach-share').addEventListener('click', () => {
    saveImage();
    document.getElementById('achievement').classList.add('hidden');
  });

  // Debug
  window.__debug = { state, litCanvas, litCtx, tempCanvas, particles, sampleLitFraction };

  resize();
  buildColorSwatches();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
